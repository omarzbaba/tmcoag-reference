<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coag Reporter</title>
  <style>
/* Coag Reporter — clinical, high-contrast, large-target UI. */
:root {
  --bg: #f4f6f8;
  --surface: #ffffff;
  --surface-2: #eef2f6;
  --ink: #14202b;
  --ink-muted: #5b6b78;
  --line: #d4dde4;
  --accent: #0e6b8c;
  --accent-ink: #ffffff;
  --ok-bg: #e3f6e8; --ok-line: #2e8b46; --ok-ink: #146c2e;   /* lines meet 3:1 on white */
  --warn-bg: #fff4e0; --warn-line: #b56b00; --warn-ink: #8a5300;
  --bad-bg: #fde4e4; --bad-line: #c62f2f; --bad-ink: #a01b1b;
  --neutral-bg: #f1f4f7; --neutral-line: #cdd6dd;
  --radius: 12px;
  --shadow: 0 1px 2px rgba(20,32,43,.06), 0 4px 16px rgba(20,32,43,.06);
  --tap: 56px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --mono: "SF Mono", "Cascadia Code", Consolas, "Roboto Mono", monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body { font-family: var(--font); color: var(--ink); background: var(--bg); font-size: 16px; line-height: 1.5; }
button { font-family: inherit; cursor: pointer; }
input, button, textarea, select { font-size: 1rem; }
:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; border-radius: 6px; }

/* ---- layout ---- */
.app { display: grid; grid-template-columns: 300px 1fr; grid-template-rows: auto 1fr; height: 100vh; }
.topbar { grid-column: 1 / -1; display: flex; align-items: center; gap: 14px; padding: 12px 18px; background: var(--surface); border-bottom: 1px solid var(--line); }
.brand { font-weight: 800; font-size: 18px; letter-spacing: -.01em; }
.brand small { color: var(--ink-muted); font-weight: 600; margin-left: 6px; font-size: 12px; }
.topbar .spacer { flex: 1; }
.sidebar { background: var(--surface); border-right: 1px solid var(--line); overflow-y: auto; padding: 10px; }
.main { overflow-y: auto; padding: 22px clamp(16px, 3vw, 40px); }
.wrap { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
@media (max-width: 900px) { .app { grid-template-columns: 1fr; } .sidebar { display: none; } .wrap { grid-template-columns: 1fr; } }

/* ---- buttons ---- */
.btn { display: inline-flex; align-items: center; gap: 8px; min-height: 44px; padding: 0 16px; border-radius: 10px; border: 1px solid var(--line); background: var(--surface); color: var(--ink); font-weight: 650; }
.btn:hover { background: var(--surface-2); }
.btn.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.btn.primary:hover { filter: brightness(1.06); }
.btn.ghost { border-color: transparent; background: transparent; }
.btn.sm { min-height: 44px; padding: 0 14px; font-size: 14px; }
.btn:disabled { opacity: .45; cursor: not-allowed; }

/* ---- sidebar patient list ---- */
.plist-head { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px 10px; }
.plist-head h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-muted); margin: 0; }
.pitem { width: 100%; text-align: left; border: 1px solid transparent; background: transparent; border-radius: 10px; padding: 10px 12px; display: block; margin-bottom: 4px; }
.pitem:hover { background: var(--surface-2); }
.pitem.sel { background: #e6f0f4; border-color: #bcd9e4; }
.pitem .pname { font-weight: 700; }
.pitem .pmeta { font-size: 12.5px; color: var(--ink-muted); display: flex; align-items: center; gap: 8px; }
.dot { width: 18px; height: 18px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; line-height: 1; color: #fff; background: var(--neutral-line); flex: 0 0 auto; }
.dot.ok { background: var(--ok-line); } .dot.warn { background: var(--warn-line); } .dot.bad { background: var(--bad-line); }
.dot.neutral { background: var(--neutral-bg); color: var(--ink-muted); border: 1px solid var(--neutral-line); }

/* ---- cards ---- */
.card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; }
.card h2 { margin: 0 0 14px; font-size: 16px; }
.card.full { grid-column: 1 / -1; }
.muted { color: var(--ink-muted); }

/* ---- demographics ---- */
.demo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
.field label { display: block; font-size: 12.5px; font-weight: 700; color: var(--ink-muted); margin-bottom: 4px; }
.field input { width: 100%; min-height: 46px; padding: 8px 12px; border: 1px solid var(--line); border-radius: 9px; background: var(--surface); }

/* ---- panel picker ---- */
.panelpick { display: flex; flex-wrap: wrap; gap: 10px; }
.panelpick .btn { min-height: var(--tap); font-size: 15px; }
.panelpick .btn[aria-pressed="true"] { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ---- analyte rows ---- */
.agroup { margin-bottom: 6px; }
.agroup > h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-muted); margin: 14px 0 8px; }
.arow { display: grid; grid-template-columns: 1fr auto; gap: 8px 14px; align-items: center; padding: 10px; border: 1px solid var(--line); border-radius: 12px; margin-bottom: 10px; border-left-width: 6px; border-left-color: var(--neutral-line); }
.arow.ok { border-left-color: var(--ok-line); background: linear-gradient(0deg, var(--ok-bg), var(--ok-bg)) padding-box; }
.arow.warn { border-left-color: var(--warn-line); }
.arow.bad { border-left-color: var(--bad-line); }
.arow .alabel { font-weight: 650; }
.arow .aref { font-size: 12.5px; color: var(--ink-muted); }
.arow .actl { display: flex; align-items: center; gap: 8px; justify-self: end; }

/* big numeric stepper */
.num { display: inline-flex; align-items: stretch; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
.num button { width: var(--tap); min-height: var(--tap); border: none; background: var(--surface-2); font-size: 26px; font-weight: 700; color: var(--accent); line-height: 1; }
.num button:hover { background: #e2e9ee; }
.num input { width: 96px; border: none; text-align: center; font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums; background: var(--surface); }
.num input::-webkit-outer-spin-button, .num input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.num input[type=number] { -moz-appearance: textfield; }
.unit { font-size: 14px; color: var(--ink-muted); min-width: 42px; }

/* status chip */
.chip { min-width: 96px; text-align: center; padding: 6px 10px; border-radius: 999px; font-weight: 800; font-size: 13px; border: 1px solid var(--neutral-line); background: var(--neutral-bg); color: var(--ink-muted); }
.chip.ok { background: var(--ok-bg); border-color: var(--ok-line); color: var(--ok-ink); }
.chip.warn { background: var(--warn-bg); border-color: var(--warn-line); color: var(--warn-ink); }
.chip.bad { background: var(--bad-bg); border-color: var(--bad-line); color: var(--bad-ink); }

/* choice toggle buttons */
.choice { display: inline-flex; gap: 8px; }
.choice button { min-height: var(--tap); padding: 0 18px; border-radius: 12px; border: 2px solid var(--line); background: var(--surface); font-weight: 750; font-size: 15px; }
.choice button[aria-pressed="true"][data-kind="normal"] { background: var(--ok-bg); border-color: var(--ok-line); color: var(--ok-ink); }
.choice button[aria-pressed="true"][data-kind="abnormal"] { background: var(--warn-bg); border-color: var(--warn-line); color: var(--warn-ink); }
.choice button[aria-pressed="true"][data-kind="skip"] { background: var(--surface-2); border-color: var(--ink-muted); color: var(--ink); }

/* ---- report ---- */
.report-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.report { white-space: pre-wrap; font-family: var(--mono); font-size: 14px; line-height: 1.6; background: var(--surface-2); border: 1px solid var(--line); border-radius: 10px; padding: 16px; min-height: 180px; }
.report .rh { font-weight: 800; }
.toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 10px 16px; border-radius: 10px; box-shadow: var(--shadow); opacity: 0; transition: opacity .2s; pointer-events: none; }
.toast.show { opacity: 1; }

/* ---- settings ---- */
.settings textarea { width: 100%; min-height: 90px; padding: 10px; border: 1px solid var(--line); border-radius: 9px; font-family: var(--mono); font-size: 13px; line-height: 1.5; }
.settings .field input.range { width: 110px; min-height: 40px; }
.range-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: end; padding: 8px 0; border-bottom: 1px dashed var(--line); }
.tpl-row { margin-bottom: 14px; }
.tpl-row label { display: block; font-weight: 700; font-size: 13px; margin-bottom: 4px; }

.empty { text-align: center; color: var(--ink-muted); padding: 60px 20px; }
.draft-badge { margin-left: 10px; font-size: 11px; font-weight: 800; letter-spacing: .05em; padding: 2px 8px; border-radius: 999px; background: var(--warn-bg); color: var(--warn-ink); border: 1px solid var(--warn-line); vertical-align: middle; }

/* ---- batch UI (topbar select + sidebar batch header) ---- */
.tb-label { font-size: 13px; font-weight: 700; color: var(--ink-muted); }
.batch-select { min-height: 44px; max-width: 240px; padding: 0 10px; border: 1px solid var(--line); border-radius: 9px; background: var(--surface); font-weight: 650; }
.batch-head { padding: 6px 8px 12px; border-bottom: 1px solid var(--line); margin-bottom: 8px; }
.batch-name { width: 100%; min-height: 42px; padding: 6px 10px; border: 1px solid var(--line); border-radius: 8px; font-weight: 800; font-size: 15px; margin-bottom: 8px; background: var(--surface); }
.batch-actions { display: flex; gap: 8px; }
.batch-actions .btn { flex: 1; justify-content: center; }

/* ---- print (single OR batch — both go through the .print-batch overlay) ---- */
.print-batch { display: none; }
@media print {
  body.batch-print > .app { display: none !important; }
  body.batch-print .print-batch { display: block !important; }
  .print-batch .report-page { white-space: pre-wrap; font-family: var(--font); font-size: 12pt; line-height: 1.5; color: #000; page-break-after: always; }
  .print-batch .report-page:last-child { page-break-after: auto; }
}

</style>
</head>
<body>
  <div class="app" id="app"></div>
  <script>
/* Coag Reporter — default panel definitions.
 *
 * Each panel is data: analytes (numeric or choice, with reference ranges and a
 * clinical-significance threshold) plus EDITABLE prose template fragments. The
 * engine (engine.js) fills the {placeholders} and selects the right narrative
 * branch. Everything here can be overridden by the user in Settings, so the
 * attending controls the wording, ranges, and signature without touching code.
 *
 * Wording for vWD (negative) and Lupus anticoagulant is taken verbatim from
 * Dr. Rachel Brancamp's templates.
 */
(function (root) {
  "use strict";

  var DEFAULT_PANELS = [
    {
      id: "vwd",
      title: "von Willebrand disease panel",
      heading: "VON WILLEBRAND DISEASE PANEL",
      signature: "Rachel Brancamp, MD",
      analytes: [
        { id: "vwf_ag", label: "von Willebrand factor antigen", unit: "%", type: "number", low: 50, high: 150, abnormal: "low", decimals: 0 },
        { id: "gp1b",   label: "GP1b activity",                 unit: "%", type: "number", low: 50, high: 150, abnormal: "low", decimals: 0 },
        { id: "fviii",  label: "factor VIII activity",          unit: "%", type: "number", low: 50, high: 150, abnormal: "low", decimals: 0 },
        { id: "fibrinogen", label: "fibrinogen",          unit: "mg/dL", type: "number", low: 200, high: 450, abnormal: "low", decimals: 0 }
      ],
      // The analyte sentence ("The X (52%), Y (88%) … are not decreased.") is
      // assembled by the engine from ONLY the entered analytes, so blanks never
      // leak; these editable fragments are the fixed clinical wording around it.
      templates: {
        intro: "Laboratory testing for von Willebrand disease is performed. ",
        concl_negative: "This evaluation is negative for von Willebrand disease.",
        concl_pending: "Interpretation pending completion of the panel.",
        abnormal_tail: "These results may be consistent with von Willebrand disease; correlation with the clinical history and consideration of VWF multimer analysis / subtyping is suggested. [DRAFT abnormal wording — edit in Settings to match your preferred report.]"
      }
    },

    {
      id: "lupus_ac",
      title: "Lupus anticoagulant evaluation",
      heading: "LUPUS ANTICOAGULANT EVALUATION",
      signature: "Rachel Brancamp, MD",
      analytes: [
        { id: "ptt_la", label: "PTT-LA", type: "choice",
          options: [{ v: "neg", label: "Negative", kind: "normal" }, { v: "pos", label: "Positive", kind: "abnormal" }] },
        { id: "drvvt", label: "dRVVT", type: "choice",
          options: [{ v: "neg", label: "Negative", kind: "normal" }, { v: "pos", label: "Positive", kind: "abnormal" }] },
        { id: "drvvt_ratio", label: "dRVVT normalized ratio", type: "number", low: null, high: 1.2, abnormal: "high", decimals: 1, showWhen: { drvvt: "pos" } },
        { id: "apa_performed", label: "Antiphospholipid antibodies performed?", type: "choice",
          options: [{ v: "no", label: "Not performed", kind: "skip" }, { v: "yes", label: "Performed", kind: "normal" }] },
        { id: "acl_igg", label: "anticardiolipin IgG", unit: "GPL", type: "number", low: null, high: 15, sig: 40, abnormal: "high", decimals: 1, showWhen: { apa_performed: "yes" } },
        { id: "acl_igm", label: "anticardiolipin IgM", unit: "MPL", type: "number", low: null, high: 15, sig: 40, abnormal: "high", decimals: 1, showWhen: { apa_performed: "yes" } },
        { id: "b2_igg",  label: "anti-beta 2 glycoprotein I IgG", unit: "U/mL", type: "number", low: null, high: 20, sig: 40, abnormal: "high", decimals: 1, showWhen: { apa_performed: "yes" } },
        { id: "b2_igm",  label: "anti-beta 2 glycoprotein I IgM", unit: "U/mL", type: "number", low: null, high: 20, sig: 40, abnormal: "high", decimals: 1, showWhen: { apa_performed: "yes" } }
      ],
      // Antibody display names used when describing elevations in prose.
      apa_names: {
        acl_igg: "anticardiolipin IgG antibody",
        acl_igm: "anticardiolipin IgM antibody",
        b2_igg: "anti-beta 2 glycoprotein I IgG antibody",
        b2_igm: "anti-beta 2 glycoprotein I IgM antibody"
      },
      templates: {
        intro: "Laboratory testing for lupus anticoagulant is performed. ",
        res_both_neg: "Two tests for the presence of a lupus anticoagulant, the PTT-LA and the dRVV time, are both negative. ",
        res_ptt_only: "One test for the presence of a lupus anticoagulant, the PTT-LA, is positive, while another, the dRVV time, is negative. ",
        // {ratio_paren} expands to " (normalized ratio = 1.6)" when a ratio is
        // entered, and to nothing when it is left blank (so no "#.#" leaks).
        res_drvvt_only: "One test for the presence of a lupus anticoagulant, the dRVVT{ratio_paren}, is positive, while another, the PTT-LA, is negative. ",
        res_both_pos: "Two tests for the presence of a lupus anticoagulant, the PTT-LA and dRVVT{ratio_paren} are positive. ",
        apa_all_normal: "Anticardiolipin and anti-beta 2 glycoprotein I IgG and IgM antibodies are normal.",
        concl_neg: "This evaluation is negative for the presence of a lupus anticoagulant.",
        concl_neg_nonsig: "This evaluation is negative for the presence of a lupus anticoagulant. The elevation of the {antibody} is below a clinically significant level (>40.0).",
        concl_pos: "This evaluation suggests the presence of a lupus anticoagulant. However, confirmation requires repeat positive testing at least 12 weeks after the current evaluation.",
        concl_sig_apa: "This evaluation demonstrates a clinically significant elevation (>40.0) of the {antibody}. Testing should be repeated after at least 12 weeks to determine if this elevation persists.\n\nTesting for the presence of a lupus anticoagulant is negative.",
        concl_sig_apa_addon: "In addition, there is a clinically significant elevation (>40.0) of the {antibody}, which should be repeated after at least 12 weeks to determine if it persists."
      }
    }
  ];

  // ===================================================================
  // Drafted from the existing reviewed TM·Coag panels (click-state model).
  // These render in the same UI and use the generic rule-based prose engine.
  // Wording is a DRAFT — refine intro/conclusion in Settings (rule impressions
  // are reused verbatim from your reviewed panel logic).
  // ===================================================================
  function _opt(a) { return a.length > 3 ? { v: a[0], label: a[1], kind: a[2], report: a[3] } : { v: a[0], label: a[1], kind: a[2] }; }
  function A(id, label, group, arr) { return { id: id, label: label, type: "choice", group: group, options: arr.map(_opt) }; }
  var _N = ["normal", "Normal", "normal"], _NEG = ["negative", "Negative", "normal"];

  DEFAULT_PANELS.push({
    id: "bleeding_diathesis",
    title: "Bleeding diathesis panel",
    heading: "BLEEDING DIATHESIS PANEL",
    signature: "Rachel Brancamp, MD",
    draft: true,
    analytes: [
      A("pt", "PT / INR", "Basic coagulation", [_N, ["prolonged", "↑ Prolonged", "abnormal", "The PT/INR is prolonged."]]),
      A("aptt", "aPTT", "Basic coagulation", [_N, ["prolonged", "↑ Prolonged", "abnormal", "The aPTT is prolonged."]]),
      A("fibrinogen", "Fibrinogen", "Basic coagulation", [_N, ["low", "↓ Low", "abnormal", "The fibrinogen is decreased."], ["high", "↑ High", "abnormal", "The fibrinogen is increased (acute-phase reactant)."]]),
      A("platelet_count", "Platelet count", "Basic coagulation", [_N, ["low", "↓ Low", "abnormal", "The platelet count is decreased (thrombocytopenia)."], ["high", "↑ High", "abnormal", "The platelet count is increased (thrombocytosis)."]]),
      A("thrombin_time", "Thrombin time", "Basic coagulation", [_N, ["prolonged", "↑ Prolonged", "abnormal", "The thrombin time is prolonged."]]),
      A("d_dimer", "D-dimer", "Basic coagulation", [_N, ["elevated", "↑ Elevated", "abnormal", "The D-dimer is elevated."]]),
      A("vwf_gp1b", "VWF:GP1bM activity", "Von Willebrand screen", [_N, ["decreased", "↓ Low", "abnormal", "The VWF activity (GP1bM) is reduced."]]),
      A("vwf_ag", "Von Willebrand antigen", "Von Willebrand screen", [_N, ["decreased", "↓ Low", "abnormal", "The VWF antigen is reduced."]]),
      A("factor_viii", "Factor VIII activity", "Von Willebrand screen", [_N, ["decreased", "↓ Low", "abnormal", "The factor VIII activity is reduced."], ["elevated", "↑ High", "abnormal", "The factor VIII activity is elevated (acute-phase reactant)."]]),
      A("multimer", "Multimeric analysis", "Von Willebrand screen", [_N, ["abnormal", "Abnormal", "abnormal", "The multimer pattern is abnormal (loss of high-molecular-weight multimers)."]]),
      A("factor_xii", "Factor XII activity", "Specific factors", [_N, ["decreased", "↓ Low", "abnormal", "The factor XII activity is reduced."]]),
      A("factor_ix", "Factor IX activity", "Specific factors", [_N, ["decreased", "↓ Low", "abnormal", "The factor IX activity is reduced."]]),
      A("factor_xi", "Factor XI activity", "Specific factors", [_N, ["decreased", "↓ Low", "abnormal", "The factor XI activity is reduced."]]),
      A("factor_v", "Factor V activity", "Specific factors", [_N, ["decreased", "↓ Low", "abnormal", "The factor V activity is reduced."]]),
      A("factor_vii", "Factor VII activity", "Specific factors", [_N, ["decreased", "↓ Low", "abnormal", "The factor VII activity is reduced."]]),
      A("factor_x", "Factor X activity", "Specific factors", [_N, ["decreased", "↓ Low", "abnormal", "The factor X activity is reduced."]]),
      A("factor_ii", "Factor II activity", "Specific factors", [_N, ["decreased", "↓ Low", "abnormal", "The factor II (prothrombin) activity is reduced."]]),
      A("factor_xiii", "Factor XIII screen", "Specific factors", [_NEG, ["positive", "+ Positive", "abnormal", "The factor XIII screen is positive (soluble clot), indicating factor XIII deficiency."]]),
      A("inhibitor_screen", "Factor inhibitor screen", "Specific factors", [_NEG, ["positive", "+ Positive", "abnormal", "The factor inhibitor screen is positive (Bethesda units detected)."]]),
      A("closure_epi", "PFA closure time — EPI", "Specific factors", [_N, ["prolonged", "↑ Prolonged", "abnormal", "The PFA closure time (EPI) is prolonged."]]),
      A("closure_adp", "PFA closure time — ADP", "Specific factors", [_N, ["prolonged", "↑ Prolonged", "abnormal", "The PFA closure time (ADP) is prolonged."]])
    ],
    rules: [
      { id: "vwd_quantitative", when: { vwf_gp1b: ["decreased"], vwf_ag: ["decreased"] }, impression: "Reduced VWF activity and antigen support von Willebrand disease; proportionally reduced activity and antigen (ratio ≥0.7) favour a quantitative type 1 defect, and factor VIII is often reduced in parallel." },
      { id: "vwd_qualitative", when: { vwf_gp1b: ["decreased"], vwf_ag: ["normal", "not_done"] }, impression: "Reduced VWF activity with preserved antigen (low activity:antigen ratio, <0.7) suggests a qualitative type 2 von Willebrand defect; confirm with multimer analysis." },
      { id: "vwd_low_antigen", when: { vwf_ag: ["decreased"], vwf_gp1b: ["normal", "not_done"] }, impression: "Reduced VWF antigen indicates low von Willebrand factor; with proportionally reduced activity this is type 1 von Willebrand disease. Blood group O lowers VWF physiologically." },
      { id: "multimer_abn", when: { multimer: ["abnormal"] }, impression: "An abnormal multimer pattern (loss of high-molecular-weight multimers) supports type 2 von Willebrand disease." },
      { id: "isolated_pt", when: { pt: ["prolonged"], aptt: ["normal", "not_done"] }, impression: "Isolated PT prolongation points to factor VII deficiency or an early/partial vitamin-K-dependent defect (warfarin, vitamin K deficiency, early liver disease)." },
      { id: "isolated_aptt", when: { aptt: ["prolonged"], pt: ["normal", "not_done"] }, impression: "Isolated aPTT prolongation indicates an intrinsic-pathway factor deficiency (VIII, IX, XI, or XII) or — with low factor VIII — von Willebrand disease; an inhibitor or lupus anticoagulant is also possible." },
      { id: "both_pt_aptt", when: { pt: ["prolonged"], aptt: ["prolonged"] }, impression: "Combined PT and aPTT prolongation suggests a common-pathway or multiple-factor process: liver disease, vitamin K deficiency or warfarin, DIC, or a deficiency of factor II, V, or X." },
      { id: "dic", when: { platelet_count: ["low"], fibrinogen: ["low"], d_dimer: ["elevated"] }, impression: "Thrombocytopenia with low fibrinogen and an elevated D-dimer, in the appropriate setting, is consistent with disseminated intravascular coagulation (DIC)." },
      { id: "f8_low", when: { factor_viii: ["decreased"] }, impression: "Reduced factor VIII may reflect hemophilia A, von Willebrand disease (factor VIII low secondary to low VWF), or an acquired factor VIII inhibitor." },
      { id: "f9_low", when: { factor_ix: ["decreased"] }, impression: "Reduced factor IX is consistent with hemophilia B." },
      { id: "f11_low", when: { factor_xi: ["decreased"] }, impression: "Reduced factor XI (the bleeding risk correlates poorly with the level)." },
      { id: "f12_low", when: { factor_xii: ["decreased"] }, impression: "Reduced factor XII prolongs the aPTT but is not associated with bleeding." },
      { id: "f7_low", when: { factor_vii: ["decreased"] }, impression: "Reduced factor VII is an isolated extrinsic-pathway deficiency (prolongs the PT only)." },
