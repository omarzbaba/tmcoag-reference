<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TM·Coag Reference — Transfusion Medicine &amp; Coagulation</title>
  <style>
:root {
  --bg: oklch(98% 0.004 250);
  --surface: oklch(100% 0 0);
  --surface-2: oklch(96.5% 0.006 250);
  --ink: oklch(24% 0.02 260);
  --ink-soft: oklch(45% 0.02 260);
  --ink-faint: oklch(60% 0.015 260);
  --line: oklch(90% 0.01 260);
  --accent: oklch(52% 0.13 250);
  --accent-wash: oklch(95% 0.03 250);

  /* semantic status */
  --good: oklch(58% 0.13 150);
  --good-wash: oklch(95% 0.05 150);
  --warn: oklch(72% 0.15 75);
  --warn-wash: oklch(96% 0.06 80);
  --bad: oklch(57% 0.19 25);
  --bad-wash: oklch(96% 0.05 25);
  --info: oklch(55% 0.11 250);

  --radius: 12px;
  --shadow: 0 1px 2px oklch(50% 0.02 260 / 0.06), 0 8px 24px oklch(50% 0.02 260 / 0.06);
  --maxw: 980px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
  --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; }
body {
  font-family: var(--font);
  color: var(--ink);
  background: var(--bg);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ---- top bar ---- */
.topbar {
  position: sticky; top: 0; z-index: 20;
  display: flex; align-items: center; gap: 20px;
  padding: 12px 20px;
  background: oklch(100% 0 0 / 0.85);
  backdrop-filter: saturate(180%) blur(12px);
  border-bottom: 1px solid var(--line);
}
.brand { display: flex; align-items: baseline; gap: 8px; flex: 0 0 auto; }
.brand-mark { font-weight: 800; letter-spacing: -0.02em; font-size: 19px; color: var(--ink); }
.brand-sub { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--accent); }
.search-wrap { flex: 1; max-width: 620px; margin: 0 auto; }
#search {
  width: 100%; padding: 10px 14px; font-size: 15px;
  border: 1px solid var(--line); border-radius: 999px; background: var(--surface);
  color: var(--ink); outline: none; transition: border-color .15s, box-shadow .15s;
}
#search:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-wash); }

/* ---- layout ---- */
.layout { display: grid; grid-template-columns: 232px 1fr; align-items: start; }
.sidebar {
  position: sticky; top: 57px; height: calc(100vh - 57px);
  padding: 16px 12px; border-right: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 4px; background: var(--bg);
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px;
  color: var(--ink-soft); text-decoration: none; font-weight: 600; font-size: 14.5px;
  transition: background .12s, color .12s;
}
.nav-item:hover { background: var(--surface-2); color: var(--ink); }
.nav-item.active { background: var(--accent); color: white; }
.nav-item.active .nav-emoji { filter: none; }
.nav-emoji { font-size: 16px; }
.nav-foot { margin-top: auto; padding: 12px; font-size: 11.5px; color: var(--ink-faint); line-height: 1.45; }

.content { padding: 28px clamp(20px, 4vw, 48px) 80px; min-height: 60vh; max-width: calc(var(--maxw) + 96px); }
.content:focus { outline: none; }

/* ---- page header ---- */
.page-head { margin-bottom: 18px; }
.page-head h1 { font-size: clamp(22px, 1rem + 1.4vw, 30px); margin: 0 0 6px; letter-spacing: -0.02em; }
.page-head p { margin: 0; color: var(--ink-soft); max-width: 68ch; }
.muted { color: var(--ink-faint); }

/* ---- cards ---- */
.card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px 20px; margin-bottom: 16px; }
.card h2 { margin: 0 0 4px; font-size: 18px; letter-spacing: -0.01em; }
.card h3 { margin: 14px 0 6px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-faint); }
.grid { display: grid; gap: 14px; }
@media (min-width: 760px) { .grid.two { grid-template-columns: 1fr 1fr; } }

/* ---- badges / pills ---- */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 999px; font-size: 12px; font-weight: 700; line-height: 1.7; white-space: nowrap; }
.cat-I   { background: var(--good-wash); color: var(--good); }
.cat-II  { background: var(--accent-wash); color: var(--accent); }
.cat-III { background: var(--warn-wash); color: oklch(48% 0.12 70); }
.cat-IV  { background: var(--bad-wash); color: var(--bad); }
.grade { background: var(--surface-2); color: var(--ink-soft); font-variant-numeric: tabular-nums; }
.pill { background: var(--surface-2); color: var(--ink-soft); font-weight: 600; }
.pill.sig { background: var(--bad-wash); color: var(--bad); }
.pill.ok { background: var(--good-wash); color: var(--good); }

/* ---- tables / rows ---- */
.rows { display: flex; flex-direction: column; }
.row {
  display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center;
  padding: 11px 14px; border: 1px solid var(--line); border-bottom: none; background: var(--surface);
  cursor: pointer; transition: background .1s;
}
.row:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.row:last-child { border-bottom: 1px solid var(--line); border-radius: 0 0 var(--radius) var(--radius); }
.row:hover { background: var(--surface-2); }
.row-main { min-width: 0; }
.row-title { font-weight: 650; }
.row-sub { font-size: 13px; color: var(--ink-faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.row-badges { display: flex; gap: 6px; align-items: center; }

.kvs { display: grid; grid-template-columns: max-content 1fr; gap: 4px 16px; font-size: 14px; }
.kvs dt { color: var(--ink-faint); font-weight: 600; }
.kvs dd { margin: 0; }

ul.tight { margin: 6px 0; padding-left: 20px; }
ul.tight li { margin: 3px 0; }

/* indicated / not-indicated blocks */
.split { display: grid; gap: 12px; }
@media (min-width: 720px) { .split { grid-template-columns: 1fr 1fr; } }
.block { border-radius: 10px; padding: 12px 14px; font-size: 14px; }
.block.yes { background: var(--good-wash); }
.block.no  { background: var(--bad-wash); }
.block.note { background: var(--surface-2); }
.block h4 { margin: 0 0 6px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; }
.block.yes h4 { color: var(--good); }
.block.no h4 { color: var(--bad); }

/* legend chips */
.legend { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 4px; }
.legend .badge { cursor: default; }

/* reaction detail */
.detail-head { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 4px; }

/* NHSN diagnostic-certainty criteria block */
.certainty { display: flex; flex-direction: column; gap: 8px; margin: 6px 0 4px; }
.cert { display: grid; grid-template-columns: 92px 1fr; gap: 12px; align-items: start; padding: 10px 12px; background: var(--surface-2); border-radius: 10px; font-size: 13.5px; }
.cert .badge { justify-self: start; }
.cert-txt { line-height: 1.45; }
.back { background: none; border: none; color: var(--accent); font-weight: 600; cursor: pointer; padding: 0; margin-bottom: 12px; font-size: 14px; }
.back:hover { text-decoration: underline; }

.empty { color: var(--ink-faint); padding: 24px; text-align: center; }
mark { background: oklch(92% 0.12 95); color: inherit; border-radius: 3px; padding: 0 1px; }

@media (max-width: 720px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 1px solid var(--line); }
  .nav-foot { display: none; }
}

/* ---- module toolbar + filters ---- */
.toolbar { margin: 4px 0 12px; }
.mod-search { width: 100%; padding: 10px 14px; font-size: 15px; border: 1px solid var(--line); border-radius: 10px; background: var(--surface); color: var(--ink); outline: none; }
.mod-search:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-wash); }
.chiprow { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; margin: 8px 0; }
.chiplabel { font-size: 12px; font-weight: 700; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .04em; margin-right: 2px; }
.fchip { font: inherit; font-size: 13px; font-weight: 600; padding: 5px 12px; border-radius: 999px; border: 1px solid var(--line); background: var(--surface); color: var(--ink-soft); cursor: pointer; transition: all .12s; }
.fchip:hover { border-color: var(--accent); color: var(--ink); }
.fchip.on { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ---- clickable tiles (ASFA, reactions, search) ---- */
.cardgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); gap: 12px; }
.tile { text-align: left; font: inherit; color: inherit; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px 16px; cursor: pointer; display: flex; flex-direction: column; gap: 7px; transition: transform .1s, border-color .12s, box-shadow .12s; }
.tile:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 16px oklch(50% 0.02 260 / 0.1); }
.tile-top { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.tile-title { font-weight: 650; line-height: 1.3; }
.tile-sub { font-size: 13px; color: var(--ink-faint); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* ---- blood-prep calculator ---- */
.chosen-surgery { margin-bottom: 10px; }
.chosen { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--accent-wash); border-radius: 999px; font-size: 14px; }
.abgroup { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; margin: 7px 0; }
.abchip { font: inherit; font-size: 13px; font-weight: 600; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--line); background: var(--surface); color: var(--ink-soft); cursor: pointer; transition: all .12s; }
.abchip:hover { border-color: var(--accent); }
.abchip.minor { border-style: dashed; color: var(--ink-faint); }
.abchip.on { background: var(--bad); border-color: var(--bad); color: #fff; }
.result-card { border-color: var(--accent); }
.kpis { display: flex; flex-wrap: wrap; gap: 12px; margin: 4px 0 8px; }
.kpi { background: var(--surface-2); border-radius: 10px; padding: 12px 16px; min-width: 120px; }
.kpi-val { font-size: 22px; font-weight: 800; letter-spacing: -0.01em; color: var(--ink); }
.kpi-lab { font-size: 12px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .04em; margin-top: 2px; }

/* ---- coag reporter + buttons ---- */
.reporter-card { border-color: var(--accent); }
.btn-primary { display: inline-block; margin-top: 6px; padding: 10px 18px; background: var(--accent); color: #fff; border-radius: 10px; font-weight: 650; text-decoration: none; }
.btn-primary:hover { filter: brightness(1.05); }

/* ---- per-reaction axis tables (biovigilance table form) ---- */
.cert3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 6px 0 10px; }
.cert3-col { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; background: var(--surface); }
.cert3-col.na { opacity: .65; }
.cert3-head { padding: 8px 12px; font-size: 12.5px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: .04em; text-align: center; }
.cert3-head.cat-IV { background: var(--bad); }
.cert3-head.cat-III { background: var(--warn); color: oklch(32% 0.06 70); }
.cert3-head.cat-II { background: var(--accent); }
.cert3-body { padding: 11px 13px; font-size: 13px; line-height: 1.5; }
.axis2 { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; margin: 6px 0 10px; background: var(--surface); }
.axis2-row { display: grid; grid-template-columns: 178px 1fr; gap: 12px; padding: 9px 13px; align-items: start; border-top: 1px solid var(--line); }
.axis2-row:first-child { border-top: none; }
.axis2-k { justify-self: start; }
.axis2-v { font-size: 13.5px; line-height: 1.45; }

/* ---- embedded Coag Reporter ---- */
.reporter-embed { padding: 10px; }
.reporter-frame { width: 100%; height: 80vh; min-height: 600px; border: 1px solid var(--line); border-radius: 8px; display: block; background: #fff; }

@media (max-width: 720px) {
  .cert3 { grid-template-columns: 1fr; }
  .axis2-row { grid-template-columns: 1fr; gap: 3px; }
}

/* ---- misc ---- */
.legend-card summary { cursor: pointer; font-weight: 650; }
.legend-card[open] summary { margin-bottom: 8px; }
.tiny { font-size: 12px; }

</style>
</head>

nsplantation, liver","indication":"Desensitization, ABOi, living donor","procedure":"TPE","category":"I","grade":"1C","page":261},{"disease":"Transplantation, liver","indication":"Desensitization, ABOi, deceased donor","procedure":"TPE","category":"III","grade":"2C","page":261},{"disease":"Transplantation, liver","indication":"Antibody mediated rejection","procedure":"TPE","category":"III","grade":"2C","page":261},{"disease":"Transplantation, liver","indication":"Antibody mediated rejection","procedure":"ECP","category":"III","grade":"2B","page":261},{"disease":"Transplantation, liver","indication":"Immune suppression withdrawal","procedure":"ECP","category":"III","grade":"2B","page":261},{"disease":"Transplantation, liver","indication":"Desensitization, ABOi","procedure":"ECP","category":"III","grade":"2C","page":261},{"disease":"Transplantation, lung","indication":"Chronic lung allograft dysfunction","procedure":"ECP","category":"II","grade":"1C","page":263},{"disease":"Transplantation, lung","indication":"Bronchiolitis obliterans syndrome","procedure":"ECP","category":"II","grade":"1C","page":263},{"disease":"Transplantation, lung","indication":"Antibody mediated rejection","procedure":"TPE","category":"III","grade":"2C","page":263},{"disease":"Transplantation, lung","indication":"Desensitization","procedure":"TPE","category":"III","grade":"2C","page":263},{"disease":"Vaccine-induced immune thrombotic thrombocytopenia","indication":"Refractory","procedure":"TPE","category":"III","grade":"2C","page":265},{"disease":"Vasculitis, ANCA associated","indication":"Microscopic polyangiitis","procedure":"TPE","category":"III","grade":"1B","page":267},{"disease":"Vasculitis, ANCA associated","indication":"Granulomatosis with polyangiitis","procedure":"TPE","category":"III","grade":"1B","page":267},{"disease":"Vasculitis, ANCA associated","indication":"Eosinophilic granulomatosis with polyangiitis","procedure":"TPE","category":"III","grade":"2C","page":267},{"disease":"Vasculitis, IgA","indication":"Crescentic rapidly progressive glomerulonephritis","procedure":"TPE","category":"III","grade":"2C","page":269},{"disease":"Vasculitis, IgA","indication":"Severe extra-renal manifestations","procedure":"TPE","category":"III","grade":"2C","page":269},{"disease":"Vasculitis, other","indication":"Hepatitis B polyarteritis nodosa","procedure":"TPE","category":"II","grade":"2C","page":271},{"disease":"Vasculitis, other","indication":"Kawasaki disease","procedure":"TPE","category":"III","grade":"2C","page":271},{"disease":"Vasculitis, other","indication":"Multisystem inflammatory syndrome in children","procedure":"TPE","category":"III","grade":"2C","page":271},{"disease":"Voltage-gated potassium channel antibody-related diseases","indication":"","procedure":"TPE/IA","category":"II","grade":"1B","page":273},{"disease":"Wilson disease, fulminant","indication":"","procedure":"TPE","category":"I","grade":"1C","page":275}]},"asfaProtocols":{"_comment":"Per-disease apheresis prescription details, parsed from the fact-sheet boxes of the ASFA 9th Special Issue (2023). Editable; verify against source. The '×10^9' superscript is lost by text extraction and partially restored.","edition":"ASFA 9th Special Issue (2023)","source":"Connelly-Smith L, et al. J Clin Apher. 2023;38:77-278. doi:10.1002/jca.22043 — per fact-sheet 'Volume treated / Replacement fluid / Frequency' boxes and 'Duration and discontinuation/number of procedures' sections.","protocols":{"Acute disseminated encephalomyelitis":{"volume":"1 to 1.5 TPV","replacement":"Albumin","frequency":"Every other day","num_procedures":"There is no clear recommendation on the optimal regimen of TPE in ADEM. The principal outcome of interest for TPE is acute response to treatment, rather than long-term effects on attack frequency. In one of the largest ADEM CS, TPE achieved moderate and marked sustained improvement in 40% of the patients (Keegan, 2002). Factors associated with improvement were preserved reflexes and early initiation of treatment. In most studies, clinical response was noticeable within days, usually after 2 to 3 TPEs. Treatment schedule varies between cen- ters; most centers start with 5 to 7 procedures initially.","page":95},"Acute inflammatory demyelinating polyradiculoneuropathy":{"volume":"TPE: 1 to 1.5 TPV; IA: up to 3 TPV","replacement":"TPE: albumin or plasma; IA: NA","frequency":"Every other day or daily","num_procedures":"The typical TPE strategy is to exchange 1 to 1.5 plasma volumes 5 to 6 times over 10 to 14 days, some patients may need additional treat- ments. Considerations for IA are essentially identical.","page":97},"Acute liver failure":{"volume":"1 to 1.5 TPV; TPE-HV: target 8 to 12L exchange","replacement":"Plasma or plasma/albumin","frequency":"Daily","num_procedures":"In ALF, daily TPE is typically performed for a defined period as a bridge to LT or liver self-regeneration. The biochemical response to TPE should be evaluated in laboratory values drawn the following day (≥12 hours or more after TPE) to address recirculation from the interstitium. Samples drawn immediately after completion of TPE would be expected to appear better compared to pre-TPE levels. In studies, TPE-HV was performed on 3 consecutive days. In AFLP, TPE is used until amelioration and/or delivery.","page":99},"Acute toxins, venoms and poisons":{"volume":"1 to 2 TPV","replacement":"Albumin, plasma","frequency":"Daily","num_procedures":"TPE is usually performed daily until the clinical symptoms have abated and delayed release of toxin from tissues is no longer problematic.","page":101},"Age related macular degeneration":{"volume":"0.8 to 1.5 TPV","replacement":"NA","frequency":"8-10 treatments (2/week) over 8-21 weeks","num_procedures":"Clinical benefit of a single course of treatment has been reported to last for up to 4 years. Repeated treatment over several years has not been systematically investigated.","page":103},"Alzheimer's disease":{"volume":"1 TPV","replacement":"Albumin","frequency":"AMBAR study protocol: 6-weeks with 1 TPE (2500 to 3000 mL, \u00011 PV) per week, followed by a 12-month maintenance treatment with 1 low-volume TPE (690-880 mL) per month","num_procedures":"Robust conclusion on duration, discontinuation and number of procedures are not possible at this time due to the limited experience with TPE in AD.","page":105},"Amyloidosis, systemic, dialysis related":{"volume":"1 to 1.5 TPV","replacement":"NA","frequency":"3x/week with hemodialysis","num_procedures":"For DRA, clinical trials have reported outcomes after 1 or 2 years of treatment, but a survey of 345 patients reported a treatment period of 3.5±2.7 years (range 9 months-11 years) (Gejyo, 2013). Given continuous ß2-microglobulin production and accumulation in patients on long- term dialysis, likely the use should be ongoing/indefinite.","page":107},"Anti-glomerular basement membrane disease":{"volume":"1 to 1.5 TPV","replacement":"Albumin; plasma when DAH present","frequency":"Daily at initiation with subsequent reduction of frequency according to individual clinical course, up to 10 treatments might be necessary","num_procedures":"In most patients undergoing TPE and immunosuppression, anti-GBM antibodies fall to undetectable levels within 2 weeks; thus, the minimum course of TPE should be 10 to 20 days. It is generally recommended that the treatment begin daily for 2 to 3 weeks or until the anti-GBM level is undetectable (Rovin, 2021). At the end of the 2-3 week regimen, the need for further TPE is dependent upon the patient's clinical status and antibody titer. If DAH persists, or antibody titers are rebounding, the TPE regimen should be extended, at which time a taper to every other day may be considered.","page":109},"Atopic dermatitis, recalcitrant":{"volume":"ECP: varies; IA: 2 to 4 TPV; TPE and DFPP: 1 to 2 TPV","replacement":"TPE/DFPP: albumin","frequency":"ECP: 1 cycle of 2 procedures every 2 weeks for 12 weeks, then tapering; IA: series of up to 3 to 5 consecutive daily IA every 4 weeks up to 10 to 12 total; TPE and DFPP: weekly","num_procedures":"The initial ECP treatment for AD is typically one cycle (2 treatments) every 2 weeks for 12 weeks, thereafter ECP treatment regimen depends on individual response, but is typically performed every 3-4 weeks, and then tapered to every 6-12 weeks before stopping; however, protocols have varied. Several studies have performed ECP treatments on consecutive days and many centers continue to use this practice. Relapse could be treated by returning to the interval frequency of the previously effective treatment schedule. In IA, 10 to 12 treatments are per- formed over 4-6 weeks.","page":111},"Autoimmune dysautonomia":{"volume":"1 to 2 PV","replacement":"Albumin","frequency":"POTS: 2 to 3 times per week; AAG: 1 to 5 times per week","num_procedures":"For POTS, series of 4 to 6 TPE over two weeks have been reported. Symptoms are reported to reoccur 4 weeks to 6 months after cessation of TPE. Maintenance TPE (1-4 procedures performed every 2-3 weeks) has been proposed. Progressive spacing of maintenance procedure frequency has been suggested. For AAG, 1 to 5 TPE performed per week over the course of 1 to 6 weeks have been reported. Maintenance TPE (1-2 procedures performed every 4 weeks) has been described.","page":113},"Autoimmune hemolytic anemia, severe":{"volume":"1 to 1.5 TPV","replacement":"Albumin","frequency":"Daily or every other day","num_procedures":"Until hemolysis decreases and the need for transfusions is limited or until immunosuppressive therapy takes effect.","page":115},"Babesiosis":{"volume":"1 to 2 total RBC volume(s)","replacement":"Leukoreduced RBCs (or other as above)","frequency":"Single procedure, but may be repeated if parasitemia >10%","num_procedures":"The specific level of parasitemia to perform RBC exchange is unclear but >10% parasitemia in the presence of severe symptoms is the most commonly used guideline to initiate the procedure. The specific level to which parasitemia must be reduced to elicit the maximum therapeu- tic effect is also unknown, but a single RBC exchange can reduce parasitemia by 70% to 80%. Decision to repeat the exchange is based on the clinical condition (ongoing signs and symptoms) in the presence of post-exchange parasitemia (>10%). Treating physicians should be aware of the potential for rebound in parasitic burden post-RBC exchange and thus, post-exchange parasitemia surveillance is crucial.","page":117},"Burn shock resuscitation":{"volume":"1.5 TPV","replacement":"Albumin, plasma","frequency":"See below","num_procedures":"TPE is typically performed within the first 24 hours (8-16 hours) with additional 1 to 2 TPE procedures in selected patients whose MAP and UOP do not increase or whose IV fluid volumes do not decline to predicted volumes (second TPE within 6-8 hours of first). In several CS, patients were also included that received TPE at later time points, often for indications other than resuscitation.","page":119},"Cardiac neonatal lupus":{"volume":"1 TPV","replacement":"Albumin","frequency":"3/week to weekly to monthly","num_procedures":"TPE regimens varied substantially. Some only treated until antibody levels decreased and stayed low.","page":121},"Catastrophic antiphospholipid syndrome":{"volume":"1 to 1.5 TPV","replacement":"Plasma alone or in combination with albumin","frequency":"Daily or every other day","num_procedures":"Most published cases have reported daily or every other day TPE for a minimum of 3 to 5 days up to courses of 1-3 weeks, but some patients have been treated with longer courses. Clinical response dictates the duration of TPE; no single clinical or laboratory parameter is used to determine when to discontinue treatment. Some have followed antiphospholipid antibody titers to monitor response to treatment (Flamholz, 1999).","page":123},"Chronic acquired demyelinating polyneuropathies":{"volume":"1 to 1.5 TPV","replacement":"Albumin","frequency":"See below","num_procedures":"Typical course is 3 to 6 treatments over 10 to 14 days with regimen being guided by clinical symptomatology.","page":125},"Chronic focal encephalitis":{"volume":"TPE: 1 to 1.5 TPV; IA: up to 2.5 TPV","replacement":"TPE: albumin; IA: NA","frequency":"Initial course of 5 to 7 TPE or IA, adjusted to the individual response and concomitant immunosuppressive treatment","num_procedures":"After an initial course of treatment, subsequent courses of TPE (with or without IVIG), or IA may be performed at intervals of 1 to several weeks for a period up to 9 months as empirically needed to maintain clinical stability and avoid or delay hemispherectomy. Immunosuppres- sive medications may increase the interval between courses.","page":127},"Chronic inflammatory demyelinating polyradiculoneuropathy":{"volume":"1 to 1.5 TPV","replacement":"TPE: albumin; IA: NA","frequency":"2 to 3/week until improvement, then tapered, e.g., weekly or monthly","num_procedures":"TPE or IA is safe and effective in providing short-term benefit, but rapid deterioration may occur afterwards. This may necessitate mainte- nance treatment, with repeated TPE, IA and/or other immunomodulating therapies, with frequency tailored to symptoms and tolerability of the individual patient.","page":129},"Coagulation factor deficiency and inhibitors":{"volume":"TPE: 1 to 1.5 TPV; IA:2 to 3 TPV","replacement":"TPE: plasma; IA: NA","frequency":"TPE, IA: Daily","num_procedures":"Treatments are performed daily until bleeding is controlled with other therapeutic modalities.","page":131},"Complex regional pain syndrome":{"volume":"1 to 1.5 TPV","replacement":"Albumin","frequency":"5 to 7 TPEs over a 2 to 3 week period","num_procedures":"As above, and then as indicated for maintenance management (as frequent as weekly).","page":133},"Cryoglobulinemia":{"volume":"1 to 1.5 TPV","replacement":"Albumin","frequency":"Every 1 to 3 days","num_procedures":"For acute symptoms, performance of 3 to 8 procedures, and re-evaluation for clinical benefit should be considered. TPE may rapidly improve acute symptoms and serve as a bridging therapy prior to treatment with immunosuppressive drugs. Weekly to monthly maintenance treatments may be indicated in patients who initially responded to TPE in order to prevent recurrent symptoms. Because the cryocrit is not a marker of disease activity, it should not be used as a criterion for initiating or discontinuing TPE.","page":135},"Cutaneous T-cell lymphoma":{"volume":"Varies","replacement":"NA","frequency":"Two days (one cycle) every 2 to 4 weeks, benefit is not seen with more frequent treatments","num_procedures":"The median time for a maximal response to ECP is 5 to 6 months although combination regimens may induce earlier remissions. Some patients may take as long as 10 months to respond. More rapid responses to ECP correlate with durability. Patients should be monitored and responses in skin, blood and lymph nodes documented as per published guidelines. When maximal response is achieved with ECP, it can be reduced to one cycle every 6 to 12 weeks with subsequent discontinuation if no relapses occur. If MF/SS recurs, ECP can be reinstituted at once or twice monthly. If there is no response or disease progression after 3 months of ECP alone, combination therapy or alternate agents should be considered.","page":137},"Dilated cardiomyopathy, idiopathic":{"volume":"IA: 2.5- 5L depending upon the saturation and regeneration characteristics of the column TPE: 1 to 1.5 TPV","replacement":"IA: NA; TPE: albumin","frequency":"IA: Various schedules: most commonly 5 treatments daily or every other day, TPE: 3 to 5 treatments—daily or every other day","num_procedures":"There is variability in schedules for IA and TPE, with some studies repeating courses of treatment. An RCT comparing IA treatment with a single course of 5 consecutive days versus 4 courses of 5 consecutive days repeated every 4 weeks failed to demonstrate differences in LVEF at 3 and 6 months between the two treatment schemas (Staudt, 2006).","page":139},"Erythrocytosis":{"volume":"Volume of blood processed is based on TBV, starting HCT and desired post-procedure HCT","replacement":"Albumin, normal saline","frequency":"As needed for symptomatic relief or to reach desired HCT (usually one)","num_procedures":"In patients with PV, the goal is normalization of the HCT (<45%). For secondary erythrocytosis, the goal is to relieve symptoms but retain a residual RBC mass that is optimal for tissue perfusion and oxygen delivery. A single procedure should be designed to achieve the desired post-procedure HCT.","page":141},"Erythropoietic protoporphyria, liver disease":{"volume":"TPE: 1 to 1.5 TPV; RBC exchange:1 to 1.5 RBC volume","replacement":"TPE: albumin, plasma","frequency":"TPE: every 1 to 3 days; RBC exchange: 3x/week, maintenance every week","num_procedures":"Variable and can be guided by erythrocyte and plasma porphyrin levels, and by observing decreases to levels that are associated with improvements in liver tests. These interventions may be bridging therapies for OLT and/or alloHSCT.","page":143},"Familial hypercholesterolemia":{"volume":"LA: treatment volumes vary according to recommendations of device manufacturers; TPE: 1 to 1.5 TPV","replacement":"LA: NA; TPE: albumin","frequency":"weekly or biweekly, adjusted by individual evaluation of LDL-C target attainment; FDA has recommended to obtain an inter- apheresis LDL-C level ≤120 mg/dL","num_procedures":"Chronic regular treatment every 1 to 2 weeks is clinically appropriate.","page":145},"Focal segmental glomerulosclerosis":{"volume":"TPE, LA, or IA with single use adsorbers: 1.0 to 1.5 PV; IA with regenerative adsorbers: 2 to 3 PV","replacement":"TPE: albumin, plasma; IA/LA: NA","frequency":"Daily or every other day at initiation of treatment; subsequent frequency and duration based on patient response","num_procedures":"One approach is to begin with 3 daily TPEs followed by at least 6 more TPEs in the subsequent 2 to 3 weeks, although other approaches have been reported. Proteinuria is the key parameter to evaluate and monitor for response to treatment. Tapering of apheresis treatment should be decided on a case-by-case basis and is guided by the degree of proteinuria. Timing of clinical response is variable and complete abolishment of proteinuria may take several weeks to months. Some patients require long-term regimens of weekly to monthly TPEs to prevent reappearance of the proteinuria. There are no clinical or laboratory characteristics that predict the likelihood of success with TPE. It is recommended that TPE be instituted as soon as recurrent FSGS is diagnosed, in order to halt the process and maintain kidney function. Considerations for IA treatment are essentially identical. For LA a treatment schedule of 2 times per week for 3 weeks followed by 6 weekly treatments has been suggested. In the POLARIS study, this resulted in a response rate of 54%, which was maintained in 48% after 2 years (Muso, 2015).","page":147},"Graft-versus-host disease":{"volume":"Varies.","replacement":"","frequency":"aGVHD: 2 to 3 treatments weekly until response obtained (minimum of 8 weeks); cGVHD: one cycle weekly or every other week for up to 3 months, then, if responding, taper to one cycle per month to clinical response Replacement fluid: NA","num_procedures":"A variety of regimens have been used, but the majority designate two procedures within one week as a complete “cycle.” For aGVHD, one cycle is rou- tinely performed weekly until disease response (typically minimum course of 8 weeks with weekly assessments). Individualized tapering or abrupt dis- continuation may be utilized following treatment response. For cGVHD one cycle is typically given weekly or every other week for up to 3 months or disease stabilization and then tapered to one cycle every 2 to 4 weeks (assess at 2-3 monthly intervals). A summary of published aGVHD and cGVHD ECP regimens is available from the Nordic ECP Quality Group (Nygaard, 2020). Prolonged ECP treatment may be beneficial.","page":149},"Hemophagocytic lymphohistiocytosis":{"volume":"1 to 2 TPV","replacement":"Albumin, plasma","frequency":"Daily, based on therapeutic goals","num_procedures":"Heterogeneity of patient presentations and severity complicate determination of duration and intensity of procedures. TPE use should be tai- lored to local intensive care practice and clinical status of the patient.","page":151},"Heparin-induced thrombocytopenia and thrombosis":{"volume":"1 to 1.5 TPV","replacement":"Albumin, plasma","frequency":"Daily or every other day","num_procedures":"In the setting of CPB or refractory HIT, the number of TPE procedures performed has been heterogeneous (1-11). Some centers do several procedures that are guided by laboratory parameters or clinical response (e.g., until HIT antibody titers are reduced or become negative by the testing method used; or until resolution of thrombosis-related tissue ischemia or thrombocytopenia). However, some centers do only one TPE procedure pre- operatively or intraoperatively immediately prior to CPB.","page":153},"Hereditary hemochromatosis":{"volume":"Erythrocytapheresis of 350 to 800 mL of RBCs","replacement":"Replace at least 30% of removed RBC volume with saline if removing >500 mL","frequency":"Every 2 to 3 weeks, keeping the post-procedure hemoglobin >11 g/dL","num_procedures":"Erythrocytapheresis every 2 to 3 weeks, or as tolerated, until serum ferritin ≤50 ng/mL. Maintenance treatment can follow with less frequent therapeutic phlebotomy or erythrocytapheresis to maintain serum ferritin levels 50 to 100 ng/mL.","page":155},"Hyperleukocytosis":{"volume":"1.5 to 2 TBV","replacement":"Crystalloid, albumin, and/or plasma as needed","frequency":"Daily as needed","num_procedures":"For patients with AML with leukostasis, discontinue when the symptoms resolve and/or WBC <50 \u0004 109/L. For prophylaxis of patients with AML, discontinue treatments when the WBC <100\u0004109/L (closely monitor patients with myelomonocytic and monocytic subtypes). For patients with ALL with leukostasis, discontinue when the symptoms resolve and/or WBC <400 \u0004 109/L. For prophylaxis of patients with ALL, discontinue treatment when WBC <400 \u0004 109/L.","page":157},"Hypertriglyceridemic pancreatitis":{"volume":"1 to 1.5 TPV","replacement":"Albumin, plasma","frequency":"Daily for 1 to 3 days depending upon patient course and TG level; prophylactic use has not been investigated systematically, weekly to monthly treatment reported to maintain TG at moderate levels","num_procedures":"For patients with acute HTG-AP, typically 1 to 3 TPE have been used to lower TG levels, with additional treatments if necessary. For patients treated prophylactically, chronic therapy for years has been reported.","page":159},"Hyperviscosity in hypergammaglobulinemia":{"volume":"1 to 1.5 TPV","replacement":"Albumin, plasma","frequency":"Daily or every other day","num_procedures":"Daily or every other day TPE until acute symptoms abate (generally 1-3 procedures). Clinical monitoring of viscosity as well as IgM or IgG levels are recommended during treatment to determine if subsequent TPE procedures are necessary. The reduction in IgM may be less than the theoretical reduction of an ideal solute (Miyamoto, 2018). Retinal changes in otherwise asymptomatic patients with WM respond dramat- ically to a single TPE with marked or complete reversal of the abnormal exam findings. When patients are maintained at a level under their symptomatic threshold, clinical manifestations of the syndrome usually are prevented. A maintenance schedule of TPE every 1 to 4 weeks based on clinical symptoms or retinal changes may be employed to maintain clinical stability while initiating chemotherapy ± immunother- apy. Prophylactic TPE is performed to lower IgM to <4 g/dL prior to rituximab therapy.","page":161},"Idiopathic inflammatory myopathies":{"volume":"1 to 1.5 PV","replacement":"Albumin","frequency":"Daily or every other day","num_procedures":"Number and frequency is guided by the clinical course ranging from short-term series to extended outpatient tapers: 1 to 3 TPE per week for 3 to 13 consecutive weeks were used for MDA5-autoantibody positive CADM with rapidly progressive ILD; 5 to 10 TPE starting every other day were reported for refractory IMNM.","page":163},"IgA nephropathy":{"volume":"1 to 1.5 TPV","replacement":"Albumin or plasma","frequency":"6 to 9 over 21 days followed by 3 to 6 over 6 weeks","num_procedures":"A fixed course of therapy has been used to treat patients presenting with CreIgAN. Creatinine is monitored to determine response. In chronic progressive disease, chronic therapy with weekly TPE has been reported.","page":165},"Immune checkpoint inhibitors, immune-related adverse events":{"volume":"1.0-1.5 TPV","replacement":"Albumin, plasma","frequency":"Daily or every other day","num_procedures":"Duration depends on the underlying irAE. For most irAEs such as MG, myocarditis, or myositis, a minimum of 5 to 7 treatments may be needed to deplete IgG-specific antibodies.","page":167},"Immune thrombocytopenia":{"volume":"IA: 2 to 4 TPV; TPE: 1 TPV","replacement":"IA: NA; TPE: plasma or albumin","frequency":"IA: Once a week or every 2 to 3 days; TPE: Daily or every other day","num_procedures":"There are no clear guidelines concerning treatment schedule and duration of treatment. The series of procedures is generally discontinued when either the patient shows improvement in platelet count >50 \u0004 109/L or no improvement after approximately 6 treatments.","page":169},"Inflammatory bowel disease":{"volume":"Adacolumn: 1800 mL; Cellsorba: 3000 mL: ECP: varies","replacement":"NA","frequency":"Once per week, more intensive therapy may include daily or two times/week","num_procedures":"The typical length of treatment is 5 to 10 weeks for Adacolumn and 5 weeks for Cellsorba. Aforementioned case series utilized ECP on the following schedules, respectively: twice weekly, every week for 4 weeks, followed by twice weekly, every other week for 7 weeks and two ECP treatments every two weeks for 24-weeks.","page":171},"Lambert-Eaton myasthenic syndrome":{"volume":"1 to 1.5 TPV","replacement":"Albumin","frequency":"Daily or every other day","num_procedures":": Treatment should continue until a clear clinical and EMG response is obtained or at least until a 2 to 3-week course of TPE has been com- pleted. Repeated courses may be applied in case of neurological relapse, with effects lasting up to 6 weeks in the absence of immunosuppres- sive therapy. The reported TPE regimens vary, 5 to 7 TPEs over 10 to 14 days is a reasonable course to start. Regimens are typically adjusted to symptom response. Longer course may be necessary (5-15 TPEs over 4-19 days; Newsom-Davis, 1984). Of note, after initiation of TPE, improvement may not be seen for 2 weeks or more, potentially due to the slower turnover of the presynaptic VGCC compared to the postsyn- aptic acetylcholine receptor.","page":173},"Lipoprotein(a) hyperlipoproteinemia":{"volume":"Plasma or whole blood volumes vary according to recommendations of device manufacturers.","replacement":"NA","frequency":"Once every 1-2 weeks","num_procedures":"Treatment is continued indefinitely. Lp(a) target levels to guide LA frequency; time averaged or post-LA concentration have not been defined. A single session should have >60% reduction of pre-LA Lp(a) concentration.","page":175},"Malaria":{"volume":"1 to 2 total RBC volumes","replacement":"RBCs (consider leukoreduced)","frequency":"1 to 2 treatments","num_procedures":"Treatment is typically discontinued after achieving significant clinical improvement and/or <1% residual parasitemia.","page":177},"Multiple sclerosis":{"volume":"1 to 1.5 TPV with TPE; 2 to 2.5 liters for tryptophan-IA (manufacturer's recommendation); up to 2.5 TPV with regenerative immune adsorbers","replacement":"TPE: albumin; IA: NA","frequency":"Acute attack/relapse: 5 to 7 over 10 to 14 days","num_procedures":"In acute MS attack/relapse unresponsive to steroids, 5 to 7 TPE or IA procedures typically have a response rate of >50%. Early treatment initiation, within 14 to 20 days of symptom onset, predicts response.","page":179},"Myasthenia gravis":{"volume":"1 to 1.5 TPV with TPE; 2 to 2.5 liters for tryptophan-IA (manufacturer's recommendation); up to 2.5 TPV with regenerative immune adsorbers","replacement":"TPE: albumin; DFPP with plasma filters of small mean pore size distribution: albumin or FFP; IA: NA","frequency":"Acute attack/relapse or unstable disease activity: 3 to 6 treatments over 10 to 14 days; weekly to bi-weekly individually adjusted for chronic treatment","num_procedures":"TPE or IA are appropriate options as fast acting interventions to acutely decrease MG activity. Actual number of procedures depends on the clinical scenario.","page":181},"Myeloma cast nephropathy":{"volume":"1 to 1.5 TPV","replacement":"Albumin","frequency":"Daily or every other day","num_procedures":"CTs have employed TPE as a short-term adjunct to chemotherapy and fluid resuscitation over a period of 2 to 4 weeks. In some studies, a course of TPE (10-12 procedures over 2-3 weeks) may be repeated depending on the patient's clinical course. Serum FLCs should be mea- sured to determine efficacy, and treatment frequency (daily versus every other day) should be dictated by the ability to achieve ≥50% reduc- tion in FLCs.","page":183},"Nephrogenic systemic fibrosis":{"volume":"ECP: varies; TPE: 1 to 1.5 TPV","replacement":"ECP: NA; TPE: albumin","frequency":"ECP: Various schedules ranging from 2 in consecutive days every 2 to 4 weeks up to 5 procedures every other day (cycle) with increasing number of weeks between cycles (1 to 4) with 4 cycles composing a round; TPE: Various schedules ranging from daily for 5 treatments to twice per week for 10-14 treatments","num_procedures":"Time to response has not been reported for most patients treated with TPE. Improvement of early symptoms in one patient reported to have occurred within 3 days of treatment initiation. Time to response with ECP ranged from 4 to 16 months.","page":185},"Neuromyelitis optica spectrum disorder":{"volume":"TPE: 1 to 1.5 TPV; IA: 2 to 2.5 liters for tryptophan-IA (manufacturer's recommendation); up to 2.5 TPV with regenerative immune adsorbers","replacement":"Albumin","frequency":"Acute attack/relapse: daily or every other day, median of 5 treatments over 10 days, individually adjusted intervals for maintenance treatment","num_procedures":"In the majority, 5 procedures were performed on average for acute exacerbation (range 2-10) (Abboud, 2016; Ipe, 2020). Maintenance TPE every 2 to 12 weeks performed for several years after taper of gradually declining TPE frequency showed varying degrees of improvement and reduction in the number of NMOSD exacerbations (Khatri, 2012; Visvanathan, 2021).","page":187},"N-methyl-D-aspartate receptor antibody encephalitis":{"volume":"TPE: 1 to 1.5 TPV; IA: 2 to 2.5 liters for tryptophan-IA (manufacturer's recommendation) or up to 2.5 TPV with regenerative immune adsorbers","replacement":"Albumin","frequency":"5 to 12 treatments with TPE or IA over 1 to 3 weeks with individually adjusted number of and intervals between treatments","num_procedures":"In NMDAR encephalitis, IgG antibody needs to equilibrate between intravascular and extravascular spaces, as well as between plasma and CSF. Long periods of hospitalization may be required with occasional repetition of a series of TPE or IA before clinical improvement is noted.","page":189},"Paraneoplastic autoimmune retinopathies":{"volume":"1 to 1.5 TPV","replacement":"Albumin","frequency":"Every other day to weekly","num_procedures":"Different TPE protocols have been described ranging from every other day (for 1 week) up to 2 to 3 times/week (for ≥7 months) depending on clinical response (Miles, 2012; Jansen, 2015), with additional TPE treatment as needed.","page":191},"Paraneoplastic neurological syndromes":{"volume":"TPE: 1 to 1.5 TPV; IA: 2 to 4 TPV","replacement":"TPE: albumin; IA: NA","frequency":"TPE: Daily or every other day; IA: Twice weekly","num_procedures":"TPE: 5 to 6 procedures over 1 to 2 weeks. In one reported clinical study, patients were treated with protein A IA twice weekly for 3 weeks (Batchelor, 1998).","page":193},"Pediatric autoimmune neuropsychiatric disorders":{"volume":"1 to 1.5 TPV","replacement":"Albumin","frequency":"Daily or every other day","num_procedures":"Three to 6 procedures performed over 1 to 2 weeks. There is limited data on benefit of repeated TPE treatment courses.","page":195},"Pemphigus vulgaris":{"volume":"TPE/DFPP: 1 to 1.5 TPV; IA: 2 to 4 TBV; ECP: varies","replacement":"TPE: albumin, plasma; IA/ECP/DFPP: NA","frequency":"IA: First week 3 daily, then weekly and tapering; TPE: daily or every other day; ECP: One cycle every 2 or 4 weeks","num_procedures":"Approach should include monitoring of autoantibody titers and clinical symptoms. For IA and TPE, lack of clinical response after a trial period with concomitant adequate immunosuppression should be enough to discontinue treatment. For ECP, treatments were continued until clinical response was noted.","page":197},"Peripheral vascular diseases":{"volume":"3000 to 5000 mL of plasma","replacement":"NA","frequency":"Short term: variable \u00011 to 2/week; chronic: 1/1 to 2 weeks","num_procedures":"The number of procedures has varied between studies. In the acute or short term treatment studies, the treatment course often starts with 1 to 2 procedures/week then transitions to a procedure every 1 to 2 weeks phase. The number of procedures has ranged from 5 to 10 in 5 weeks to 10 in 10 weeks, though longer and shorter series have been reported. For chronic treatment, patients typically receive a procedure every 1 to 2 weeks.","page":199},"Phytanic acid storage disease":{"volume":"TPE, LA: 1 to 1.5 TPV","replacement":"TPE: albumin; LA: NA","frequency":"Daily or every other day for acute exacerbation; variable (e.g., weekly or biweekly, mainly guided by major symptoms) for chronic therapy","num_procedures":"Therapeutic strategy is ultimately determined by monitoring the patient's PA level, clinical signs, and symptoms, and the need to control or prevent exacerbations of the disease. If chronic therapy is initiated, procedures should be performed lifelong.","page":201},"Post-transfusion purpura":{"volume":"1 to 1.5 TPV","replacement":"Albumin, plasma","frequency":"Daily","num_procedures":"TPE can be discontinued when platelet count starts increasing (>20 \u0004 109/L) and clinically significant bleeding improves.","page":203},"Progressive multifocal leukoencephalopathy associated with natalizumab":{"volume":"1 to 1.5 TPV","replacement":"Albumin","frequency":"Every other day","num_procedures":"Five TPE procedures (most commonly used in reported cases) is needed for >95% of patients to lower NTZ levels <1 μg/mL, which may be used as a post-TPE target (Khatri, 2009).","page":205},"Pruritus due to hepatobiliary diseases":{"volume":"1 to 1.5 TPV","replacement":"Albumin","frequency":"3 (weekly or biweekly) procedures initially, then 2 to 4 times per month for maintenance","num_procedures":"Some may require long term TPE; treatment is individualized based on patient symptoms.","page":207},"Psoriasis":{"volume":"Adsorption: 1,500 to 2,000 mL; ECP: varies","replacement":"NA","frequency":"Adsorption: 1/week; ECP: one cycle/week for 4 months and then taper","num_procedures":"Adsorptive columns are generally used for 5 weeks (total 5 treatments). ECP has been used for different lengths of time (2 to 12 weeks), adjusted based on the patient's presentation as well as the objective of the treatment.","page":209},"Red blood cell alloimmunization, pregnancy complications":{"volume":"RBC exchange: 1 to 2 RCV; TPE: 1 to 1.5 TPV","replacement":"RBC exchange: RhD- antigen matched RBC units; TPE: albumin","frequency":"1 to 3/week","num_procedures":"TPE should be considered early in pregnancy (7-20 weeks) and continued until IUT can safely be administered (\u000120 weeks GA). Close moni- toring of the fetus for signs of hydrops aids in guiding treatment.","page":211},"Sepsis with multiorgan failure":{"volume":"1 to 1.5 TPV","replacement":"Plasma","frequency":"Daily","num_procedures":"TPE treatments ranged from 1-2 to 14 days or resolution of symptoms. HA column therapy: median 3 days (range 2-7 days).","page":213},"Sickle cell disease, acute":{"volume":"Volume necessary to achieve target HbS level","replacement":"RBC units, HbS negative, leukocyte reduced, antigen-matched (e.g., C/c, E/e, K); for TPE, the predominant replacement is plasma","frequency":"Once","num_procedures":"Typically one RBC exchange procedure achieves the desired HbS level.","page":215},"Sickle cell disease, non-acute":{"volume":"Volume necessary to achieve target HbS level","replacement":"RBC units, HbS negative, leukocyte reduced, antigen-matched (e.g., C/c, E/e, K)","frequency":"As needed to maintain target HbS level","num_procedures":"Duration and number of RBC exchanges depend upon clinical indications; one time for pre-op, variable times for chronic pain, and life-long for stroke prevention.","page":217},"Steroid-responsive encephalopathy associated with autoimmune thyroiditis":{"volume":"1 to 1.5 TPV","replacement":"Albumin","frequency":"Daily to every other day","num_procedures":"Published CRs used 3 to 9 procedures, mostly commonly five.","page":219},"Stiff-person syndrome":{"volume":"1 to 1.5 TPV","replacement":"Albumin","frequency":"Every 1 to 3 days","num_procedures":"An initial series of 5 TPEs of 1 to 1.5 TPV is typically performed over 8 to 14 days. Repeat series of TPE can be employed empirically if there is an objective clinical improvement that is followed by a relapse of symptoms. Successful use of maintenance TPE every 1 to 3 weeks for chronic treatment has also been reported.","page":221},"Sudden sensorineural hearing loss":{"volume":"TPE, HELP-apheresis, Rheopheresis: 1 TPV","replacement":"TPE: albumin; none for selective methods","frequency":"HELP-apheresis, Rheopheresis: 1 to 2 treatments; TPE, fibrinogen adsorption; 1 to 3; treatments performed on consecutive days or with 1-day intervals","num_procedures":"Procedures with all methods were mostly performed on consecutive days, depending upon response as determined by standard audiometry. There is no experience with increasing numbers of treatments over a longer period of time.","page":223},"Systemic lupus erythematosus":{"volume":"1 to 1.5 TPV","replacement":"Albumin, plasma","frequency":"LN or DAH: daily or every other day; other severe disease conditions: 1 to 3 times per week","num_procedures":"Typically, a course of 3 to 6 TPE is appropriate to see response in patients with refractory disease and/or severe complications of SLE. Pro- longed treatments have been reported but efficacy and indication of this approach are questionable.","page":225},"Systemic sclerosis":{"volume":"ECP: varies. TPE: 1 to 1.5 TPV","replacement":"ECP: NA; TPE: albumin","frequency":"ECP: Two procedures within one week (one series) every 4 to 6 week for 6 to 12 months; TPE: 1 to 3/week","num_procedures":"For ECP, a 6-month trial may be considered. If no response is noted, ECP treatment intervals should be increased or stopped completely. TPE courses vary widely. A course of six procedures over the 2 to 3 weeks should constitute a sufficient therapeutic trial. Four weekly TPE treatments have been reported to result in long-lasting improvements in symptoms. Long-term TPE (2-3 weekly for 2 weeks, 1 TPE weekly for 3 months, and 1 TPE every other week as a maintenance therapy) has also been used. In one study, TPE was discontinued when kidney function (Cr < 300 mmol/L and serum urea <15 mmol/L) remained stable for at least one month (Cr <300mmol/L and serum urea <15 mmol/L) or when the patient required dialysis (Cozzi, 2012).","page":227},"Thrombocytosis":{"volume":"1.5 to 2 TBV","replacement":"Saline and/or albumin as necessary to maintain the blood pressure","frequency":"Daily or as indicated to reach/maintain goal","num_procedures":"With acute thrombohemorrhagic events, the goal is normalization of platelet count (i.e., <400 \u0004 109/L) and/or resolution of symptoms. It is important to maintain normal counts until cytoreductive therapy takes effect. Goal for prophylaxis of high-risk patients who are pregnant, undergoing surgery, or post-splenectomy should be determined on a case-by-case basis (considering the patient's history of thrombosis or bleeding at a specific platelet count). Without an informative clinical history, platelet count of ≤450 to 600 \u0004 109/L may be enough.","page":229},"Thrombotic microangiopathy, coagulation mediated":{"volume":"1 to 1.5 TPV","replacement":"Plasma","frequency":"Daily or every other day","num_procedures":"As there is no standardized approach, the duration and schedule of TPE for treatment of thrombotic thrombocytopenic purpura has been empirically adopted in several patients, sometimes while diagnostic evaluation is ongoing. Based on final diagnosis, some patients may be transitioned to therapeutic complement inhibitors.","page":231},"Thrombotic microangiopathy, complement mediated":{"volume":"1 to 1.5 TPV","replacement":"Plasma or plasma/albumin","frequency":"Daily","num_procedures":"As there is no standardized approach, the duration and schedule of TPE for treatment of TTP have been empirically adopted. Duration or discontinuation of TPE should be based upon patient condition, response, and availability of eculizumab. When TPE is started before a diag- nosis is established, it is important to obtain relevant laboratory testing such as PCR for Shiga toxin, ADAMTS13, and anti-CFH antibodies.","page":233},"Thrombotic microangiopathy, drug induced":{"volume":"1 to 1.5 TPV","replacement":"Plasma","frequency":"Daily or every other day","num_procedures":"Performed daily until recovery of hematologic parameters and then either discontinued or tapered off, similar to treatment for idiopathic TTP.","page":235},"Thrombotic microangiopathy, infection associated":{"volume":"1 to 1.5 TPV","replacement":"STEC-HUS: plasma; pHUS: albumin","frequency":"Daily","num_procedures":"As there is no standardized approach, the duration and schedule of TPE for treatment of TTP have been empirically adopted to treat HUS. Decisions of duration or to discontinue should be made based upon patient response and condition.","page":237},"Thrombotic microangiopathy, pregnancy associated":{"volume":"1 to 1.5 TPV","replacement":"Plasma","frequency":"Daily if there is no improvement at 24 to 72 hours after delivery","num_procedures":"TPE in post-partum HELLP is generally performed until platelet counts are >100 \u0004 109/L or LDH has normalized as per TTP.","page":239},"Thrombotic microangiopathy, thrombotic thrombocytopenic purpura":{"volume":"1 to 1.5 TPV","replacement":"Plasma or plasma/albumin","frequency":"Daily","num_procedures":"TPE is generally performed daily until the platelet count is >150 \u0004 109/L, and LDH is near normal for 2 to 3 consecutive days. Residual schistocytes after discontinuation of daily TPE are not uncommon and after the initial diagnosis of TTP is made, there is no reason to continue documenting the presence or absence of schistocytes. There are no RCTs of TPE over longer duration. A small retrospective study had suggested a lower overall recur- rence rate at 6 months with taper. A common taper strategy is three times a week for the first week, twice weekly the second and then once weekly the following week(s). Other taper approaches have been documented. However a prospective observational investigation found that tapering TPE (when compared to an historical cohort of no TPE taper), did not reduce exacerbation in patients with TTP (Raval, 2020).","page":241},"Thrombotic microangiopathy, transplantation associated":{"volume":"1 to 1.5 TPV","replacement":"Plasma or plasma/albumin","frequency":"Daily, or as needed for chronic management","num_procedures":"TPE is usually performed daily until a clinical response is achieved and then either discontinued or tapered off, similar to treatment for TTP.","page":243},"Thyroid storm":{"volume":"1 to 1.5 TPV","replacement":"Plasma, albumin","frequency":"Daily to every 3 days, with monitoring of thyroid hormone levels, and guided by control of systemic symptoms","num_procedures":"TPE should be continued until clinical improvement is noted. Usually 3 to 6 procedures with a range upto >10 are performed to achieve clin- ical stabilization, potentially bridging to thyroidectomy.","page":245},"Toxic epidermal necrolysis":{"volume":"1 to 1.5 TPV","replacement":"Plasma, albumin","frequency":"Daily or every other day","num_procedures":"The number of TPE treatments varies considerably from 1 to >5 procedures. Discontinuation has been guided by clinical improvement including pain relief, the lack of appearance of new skin/ocular lesions, or evidence of skin healing.","page":247},"Transplantation, heart":{"volume":"ECP: varies; TPE: 1 to 1.5 TPV","replacement":"ECP: NA; TPE: albumin, plasma","frequency":"ECP: one cycle weekly, tapered over several months; TPE: Daily or every other day","num_procedures":"In most centers, an ECP series consists of 2 procedures (1 cycle) performed weekly and eventually tapered. For refractory or recurrent rejection, ECP cycles have been performed weekly to every six weeks over a 6 to 18 month treatment period (Slomovich, 2021). A commonly employed prophylactic AMR approach is five cycles in first month post-transplant followed by one cycle every other week in the second and third months post-transplant, fol- lowed by monthly cycles for the fourth, fifth, and sixth months post-transplant (Barr, 1998; Slomovich, 2021). There are no clear criteria for disconti- nuing ECP treatment, but they are typically continued until DSA are cleared to clinically inactionable levels or improvement/stabilization of symptoms are seen. Regarding TPE, improvement in heart function, biopsy findings, and DSA levels are often used to determine timing of discontinu- ation. For desensitization or AMR prophylaxis, a commonly published approach is 1 to 3 pre-transplant TPE with IVIG, followed by 3 to 5 post- transplant TPE with IS. For treatment of AMR, TPE are generally performed daily or every other day for a week, with treatments extended or tapered as needed for clinical response. Given concerns for peri-procedural bleeding in the immediate post-transplant period, supplemental use of plasma as a replacement fluid may be considered.","page":249},"Transplantation, hematopoietic stem cell, ABO incompatible":{"volume":"TPE: 1 to 1.5TPV; RBC exchange:1 to 1.5 RBC volumes","replacement":"TPE: albumin, donor and recipient ABO-compatible plasma; RBC exchange: group O RBCs","frequency":"TPE: daily; RBC exchange: once","num_procedures":"For major ABO incompatibility, the recommended safety endpoint for TPE is to reduce the recipient IgM or IgG antibody titers to <16 immediately before HPC product infusion. If there is a delayed RBC recovery or PRCA post-transplant, TPE may be performed.","page":251},"Transplantation, hematopoietic stem cell, HLA desensitization":{"volume":"1 TPV","replacement":"Albumin","frequency":"Every other day","num_procedures":"The estimated number of TPE treatments is based on baseline DSA levels correlated with flow cytometric or complement-dependent cyto- toxic crossmatch assays. In one CS, TPE was not performed during pre-transplant conditioning or with post-transplant cyclophosphamide but implemented before conditioning with one additional treatment on the day before graft infusion (Gladstone, 2013). Flow crossmatch pos- itive patients received 4 to 5 treatments and complement-dependent cytotoxic crossmatch positive patients received additional treatments. In addition, patients with DSA rebound may require additional TPE treatments in the post-transplant phase.","page":253},"Transplantation, intestine":{"volume":"1 to 1.5 TPV","replacement":"Albumin, plasma","frequency":"Daily or every other day","num_procedures":"For treatment of rejection, approximately 5 to 7 TPE procedures have been reported. Improvement in DSA levels, biopsy findings, and/or clinical symptoms can be used to determine the timing of discontinuation. For desensitization purposes, varied goals were used in published protocols, including reduction of calculated panel reactive antibody (cPRA) to <20% to 30% of baseline or negative flow crossmatch. Prophy- lactic posttransplant TPE treatment may be considered and usually is determined by risks of AMR and/or pre-transplant DSA levels. Despite prior desensitization treatment, measurement of post-transplant DSA levels should assist in the diagnosis of AMR, and the timing and type of immunosuppressive therapies to utilize (including TPE), if indicated.","page":255},"Transplantation, kidney, ABO compatible":{"volume":"1 to 1.5 TPV","replacement":"Albumin, plasma","frequency":"Daily or every other day","num_procedures":"For AMR, protocols may use 5 or 6 TPE daily or every other day or may base the number of treatments on post-TPE kidney function improvement and decreasing DSA or non-HLA antibody levels. For desensitization/prophylaxis protocols, pre-operative TPE is typically performed daily or every other day for 1 to 5 sessions until flow crossmatch becomes negative. TPE is then continued postoperatively for a minimum of 3 procedures. Further treatment is determined by risk of AMR, DSA titers, or the occurrence of AMR.","page":257},"Transplantation, kidney, ABO incompatible":{"volume":"1 to 1.5 TPV for TPE; 1.5 to 2.5 TPV for IA","replacement":"Albumin, plasma","frequency":"Daily or every other day","num_procedures":"The duration of treatment should be guided to achieve a pre-defined critical anti-A/B IgG threshold prior to transplant, taking antibody pro- duction and rebound phenomenon into account. Of note, titer results may vary by institution given differing titration methods and reagents. Most anti-A/B AMR episodes occur within the first 2 weeks following transplantation. Post-transplant ABO titers are not correlated with the incidence of rejection. Additionally, C4d positivity is very common in transplanted ABOi kidney biopsies and is not a useful marker for rejec- tion in the absence of light microscopic changes suggestive of rejection.","page":259},"Transplantation, liver":{"volume":"TPE: 1-1.5 TPV; ECP: varies","replacement":"TPE: albumin, plasma; ECP: NA","frequency":"TPE: daily or every other day. ECP: one cycle weekly or every 2-8 weeks for several months","num_procedures":"The goal of therapy in the setting of ABOi is to reduce the ABO isoagglutinin titer to less than a critical threshold prior to transplant; the threshold of critical titer is center specific. The number of TPE procedures required depends upon the patient's baseline isoagglutinin titer and on the rate of anti- body production/rebound following TPE. For ECP, the duration of therapy varies among studies. Patients should be monitored closely for graft dys- function before discontinuation of TPE or ECP. For treatment of liver rejection, TPE and ECP are usually used until improvement in liver function (such as liver enzymes, bilirubin, etc.) is achieved.","page":261},"Transplantation, lung":{"volume":"ECP: varies;. TPE, 1 to 1.5 PV","replacement":"ECP: NA; TPE: albumin, plasma","frequency":"ECP: as above; TPE: daily to every other day","num_procedures":"The optimal duration is unknown. In published studies, the number of treatment cycles for ECP ranged between 6 and 24. If clinical stabilization occurs with ECP, long-term continuation may be warranted to maintain clinical response. TPE to treat AMR typically consists of 3 to 6 exchanges. TPE timing and frequency for desensitization varies by protocol.","page":263},"Vaccine-induced immune thrombotic thrombocytopenia":{"volume":"1 TPV","replacement":"Plasma ± albumin","frequency":"Daily until platelets normalize","num_procedures":"In general, daily TPE should be continued until the platelet count normalizes (≥150 \u0004 109/L) and there is no further progression of thrombo- sis. Most CS and CRs reported 5 to 7 exchanges.","page":265},"Vasculitis, ANCA associated":{"volume":"1 to 1.5 TPV","replacement":"Albumin; plasma when DAH present","frequency":"Daily in DAH, typically every other day in absence of DAH","num_procedures":"Median number of TPE is 7 over a median period of 14 days, up to 12 have been reported to result in further improvement in patients with severe kid- ney failure (Cr ≥5.7 mg/dL or on dialysis) or DAH (deLuna, 2015). Daily therapy should be considered in patients with severe DAH, tapered to every other day as clinical situation improves.","page":267},"Vasculitis, IgA":{"volume":"1 to 1.5 TPV","replacement":"Albumin or plasma","frequency":"4 to 11 over 21 days","num_procedures":"In severe manifestations, the course of therapy has ranged from 1 to 11 TPE daily with discontinuation of TPE upon resolution of symptoms. In CreIgAVN, longer courses of therapy have occurred with therapy discontinued with improvement in kidney function as determined by creatinine measurement.","page":269},"Vasculitis, other":{"volume":"1 to 1.5x TPV","replacement":"Albumin, plasma","frequency":"Varies","num_procedures":"For HBV-PAN, 9 to 12 TPEs (2-3 per week) have been used, typically with albumin replacement. For KD refractory to IVIG, TPE is generally performed daily for 3 days or until fever and inflammatory response subsides, with a maximum of 5 days, using albumin as the typical replacement solution. In severe MIS-C, 1 to 11 TPEs have been reported, typically on consecutive days until fever and inflammatory response subsides, with some reports using plasma for replacement.","page":271},"Voltage-gated potassium channel antibody-related diseases":{"volume":"1 to 1.5 TPV with TPE; 2 to 2.5 liters for tryptophan-IA (manufacturer's recommendation); up to 2.5 TPV with regenerative immunoadsorption columns","replacement":"TPE: albumin; IA: NA","frequency":"5 to 10 treatments with TPE or IA over 7 to 14 days adjusted to the individual course","num_procedures":"Anti-LGI1/CASPR2 titers often correlate with symptoms’ severity. Thus, serial measurements of those titers are often performed after the series of treatments to monitor disease activity and evaluate response. However, response of clinical symptoms has been used to determine treatment course.","page":273},"Wilson disease, fulminant":{"volume":"1 to 1.5 TPV","replacement":"Plasma, albumin","frequency":"Daily or every other day","num_procedures":"Serum copper reduction in most CRs was achieved rapidly and maintained after the first two treatments. However, the total number of TPE performed was variable (1-11), depending on LT availability or recovery. The majority of protocols involved daily TPE X 3 to 5 treatments fol- lowed by every other day TPE (depending on clinical and laboratory presentation and response to treatment). Specific laboratory tests for the disease (e.g., serum copper, 24-hour urinary copper excretion) are not helpful to guide efficacy and frequency of treatment; judgment is based on clinical parameters and routine testing (i.e., improved encephalopathy, LFTs, and controlled hemolysis).","page":275}}},"bloodprep":{"_note":"Antigen-negative frequencies (% of donors LACKING the antigen = compatible) are standard textbook values (AABB Technical Manual / Reid & Lomas-Francis). MSBOS surgery defaults are institution-specific — verify against your blood bank's policy. 'Other/unknown' race uses the rarer of White/Black (conservative).","rh_haplotypes":{"_note":"Fisher-Race Rh haplotype (gene-complex) frequencies. Used to compute LINKAGE-AWARE antigen-negative donor frequencies when a patient has MULTIPLE Rh antibodies: D/C/E are inherited together as a haplotype, so single-antigen frequencies must NOT simply be multiplied. Standard reference values (Harmening; Reid & Lomas-Francis; Race & Sanger) — validate/tune against your reference. Each haplotype lists the antigens it expresses; a person negative for an antigen carries NO haplotype bearing it.","haplotypes":[{"code":"R0","dce":"Dce","antigens":["D","c","e"]},{"code":"R1","dce":"DCe","antigens":["D","C","e"]},{"code":"R2","dce":"DcE","antigens":["D","c","E"]},{"code":"Rz","dce":"DCE","antigens":["D","C","E"]},{"code":"r","dce":"dce","antigens":["c","e"]},{"code":"r'","dce":"dCe","antigens":["C","e"]},{"code":"r''","dce":"dcE","antigens":["c","E"]},{"code":"ry","dce":"dCE","antigens":["C","E"]}],"freq":{"white":{"R1":0.42,"r":0.37,"R2":0.14,"R0":0.04,"r'":0.02,"r''":0.01,"Rz":0.0024,"ry":0.0001},"black":{"R0":0.45,"r":0.26,"R1":0.13,"R2":0.12,"r'":0.03,"r''":0.01,"Rz":0.0,"ry":0.0}}},"abo":{"_note":"ABO group prevalence (% of donors) by ancestry, plus the RBC compatibility map (recipient group → eligible donor groups). Layered on top of the antigen-negative frequency to estimate the ABO-compatible donor pool — ABO is independent of the other blood-group systems, so it multiplies. Standard US estimates; validate/tune. RBC (not plasma) compatibility.","freq":{"white":{"O":45,"A":40,"B":11,"AB":4},"black":{"O":50,"A":26,"B":20,"AB":4}},"rbc_compatible":{"O":["O"],"A":["A","O"],"B":["B","O"],"AB":["A","B","AB","O"]}},"races":[{"value":"white","label":"White / Caucasian"},{"value":"black","label":"Black / African American"},{"value":"other","label":"Other / unknown"}],"hgb_bands":[{"value":"ge10","label":"≥ 10 g/dL"},{"value":"8to10","label":"8–9.9 g/dL"},{"value":"7to8","label":"7–7.9 g/dL"},{"value":"lt7","label":"< 7 g/dL"}],"antigens":[{"code":"D","name":"Anti-D","system":"Rh","significant":true,"neg":{"white":15,"black":8}},{"code":"C","name":"Anti-C","system":"Rh","significant":tru
