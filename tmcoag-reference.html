:"Vagotomy & pyloroplasty","group":"Gen","division":"Gen","approach":"ts","units":0},{"id":"ventriculo-peritoneal-vp-shunt-placement-revisio","name":"Ventriculo-peritoneal (VP) shunt placement/revision","group":"Neuro","division":"Neuro","approach":"ts","units":0},{"id":"vulvectomy-total-or-radical","name":"Vulvectomy, total or radical","group":"Ob/Gyn","division":"Ob/Gyn","approach":"xm","units":2},{"id":"wide-excision-of-skin-and-soft-tissue","name":"Wide excision of skin and soft tissue","group":"Plastic, Gen","division":"Plastic, Gen","approach":"ts","units":0}],"_msbos_source":"HFHS Surgical Blood Ordering Schedule (PCR-PALM-TRM-5.050-tab, rev 07/19/2021)"},"coag":{"_comment":"Per-test decision support for the coag-triage side panel. Editable — keys MUST match the test names in coag_tests.json exactly. Each test may have: indicated [], not_indicated [], pearls []. Omit or leave [] for any field.","_disclaimer":"Decision-support notes for the pathologist — verify against current guidelines (CLSI, ISTH, ASH) and your institution's protocols. Not a substitute for clinical judgment.","tests":{"PT / INR":{"indicated":["Monitor warfarin therapy (reported as INR).","Evaluate the extrinsic/common pathway (factors II, V, VII, X, fibrinogen).","Assess hepatic synthetic function; workup of vitamin K deficiency or DIC.","Targeted preop testing when there is a personal/family bleeding history or liver disease."],"not_indicated":["Routine preoperative screening in asymptomatic patients with no bleeding history.","Monitoring DOACs — PT is insensitive and reagent-dependent.","Monitoring heparin (use aPTT or anti-Xa)."],"pearls":["A normal PT does not exclude a bleeding disorder — correlate with aPTT and history."]},"aPTT":{"indicated":["Monitor unfractionated heparin.","Evaluate the intrinsic pathway; work up an unexplained prolonged aPTT.","Part of a lupus anticoagulant evaluation."],"not_indicated":["Routine preop screening without a bleeding history.","Monitoring LMWH or DOACs (use anti-Xa)."],"pearls":["Prolonged aPTT → mixing study: correction suggests factor deficiency, failure to correct suggests an inhibitor (factor-specific or lupus anticoagulant)."]},"Fibrinogen activity (Clauss)":{"indicated":["Suspected DIC, liver disease, dysfibrinogenemia, or hypofibrinogenemia.","Massive transfusion / obstetric hemorrhage — guide cryoprecipitate or fibrinogen concentrate.","Monitoring during thrombolytic therapy."],"not_indicated":["Routine screening without a bleeding or consumption context."],"pearls":["Clauss (functional) method preferred; low activity with normal antigen suggests dysfibrinogenemia."]},"Thrombin time":{"indicated":["Detect heparin contamination, dysfibrinogenemia, or hypofibrinogenemia.","Detect a direct thrombin inhibitor (dabigatran) effect.","Evaluate an isolated prolonged aPTT."],"not_indicated":["Routine coagulation screening."],"pearls":["TT is very sensitive to heparin and dabigatran — a normal TT effectively excludes clinically relevant dabigatran."]},"D-dimer":{"indicated":["Exclude VTE (DVT/PE) in LOW/intermediate pretest-probability patients (high negative predictive value).","Component of DIC scoring.","Suspected hyperfibrinolysis."],"not_indicated":["To rule IN VTE (poor specificity).","HIGH pretest probability — go straight to imaging.","Routine use in hospitalized, post-op, pregnant, or elderly patients (frequently elevated, non-specific)."],"pearls":["Use an age-adjusted cutoff (age × 10 µg/L FEU for age > 50) to improve specificity."]},"Fibrinogen antigen":{"indicated":["Classify a fibrinogen defect: dysfibrinogenemia (antigen normal/near-normal, Clauss activity low) vs hypo-/afibrinogenemia (both low).","Order alongside Clauss activity."],"not_indicated":["Acute bleeding management (use Clauss activity)."],"pearls":["Activity:antigen ratio < 0.7 suggests dysfibrinogenemia."]},"Factor II":{"indicated":["Prolonged PT ± aPTT with suspected factor II deficiency (rare congenital, or acquired — liver disease, vitamin K deficiency).","Lupus anticoagulant–hypoprothrombinemia syndrome."],"not_indicated":["Before common causes are excluded; note DOACs can alter factor assays."]},"Factor V":{"indicated":["Prolonged PT and aPTT with normal fibrinogen/TT.","Suspected congenital factor V (or combined FV/FVIII) deficiency.","Distinguish liver disease from vitamin K deficiency."],"pearls":["FV is NOT vitamin K–dependent — low FV with low vitamin K–dependent factors points to liver disease rather than vitamin K deficiency/warfarin."]},"Factor VII":{"indicated":["Isolated prolonged PT with a normal aPTT.","Suspected congenital FVII deficiency.","Early liver disease or vitamin K deficiency."],"pearls":["FVII has the shortest half-life and falls first — isolated long PT with normal aPTT."]},"Factor VIII":{"indicated":["Diagnose/classify hemophilia A.","Prolonged aPTT workup; VWD evaluation (FVIII low in type 2N/3).","Acquired hemophilia (with inhibitor testing)."],"not_indicated":["Sole reassurance during acute illness — FVIII is an acute-phase reactant; recheck when stable."],"pearls":["A normal FVIII during inflammation does not exclude mild deficiency."]},"Factor IX":{"indicated":["Diagnose/classify hemophilia B.","Prolonged aPTT workup.","Monitor factor IX replacement."]},"Factor X":{"indicated":["Prolonged PT and aPTT; suspected congenital FX deficiency.","Vitamin K deficiency / liver disease.","Acquired isolated FX deficiency."],"pearls":["Acquired isolated FX deficiency → think AL amyloidosis."]},"Factor XI":{"indicated":["Prolonged aPTT; suspected hemophilia C (common in Ashkenazi Jewish patients).","Bleeding assessment in known FXI deficiency."],"pearls":["Bleeding phenotype correlates poorly with FXI activity level."]},"Factor XII":{"indicated":["Investigate an isolated prolonged aPTT in a patient WITHOUT bleeding."],"not_indicated":["As part of a bleeding workup — FXII deficiency prolongs the aPTT but does NOT cause bleeding."],"pearls":["FXII deficiency = long aPTT, no bleeding."]},"Factor XIII":{"indicated":["Bleeding (often delayed — umbilical stump, poor wound healing, recurrent miscarriage, intracranial) with NORMAL PT/aPTT/fibrinogen.","Suspected clot-stabilization (FXIII) defect."],"not_indicated":["Routine bleeding screen — FXIII deficiency is invisible on PT/aPTT and is missed unless ordered specifically."]},"Factor XIII antigen":{"indicated":["Subclassify a confirmed FXIII deficiency (A- vs B-subunit) after an abnormal FXIII activity."],"not_indicated":["First-line screen (use FXIII activity first)."]},"Mixing study (1:1, immediate)":{"indicated":["Evaluate a prolonged PT or aPTT — separates factor deficiency (corrects) from an inhibitor (does not correct)."],"not_indicated":["When the cause is already known (e.g., documented heparin or DOAC effect)."],"pearls":["Correction → factor deficiency; no correction → inhibitor (lupus anticoagulant or specific factor inhibitor)."]},"Mixing study (incubated)":{"indicated":["Suspected time/temperature-dependent inhibitor — classically a factor VIII autoantibody (acquired hemophilia)."],"pearls":["Immediate mix corrects but the incubated (1–2 h, 37°C) mix prolongs → think factor VIII inhibitor."]},"Factor VIII inhibitor (Bethesda)":{"indicated":["Quantify a FVIII inhibitor in hemophilia A with poor replacement response.","Suspected acquired hemophilia A (isolated long aPTT + bleeding + non-correcting incubated mix)."],"pearls":["Titer (Bethesda units) guides therapy — bypassing agents vs high-dose factor."]},"Factor IX inhibitor (Bethesda)":{"indicated":["Quantify a FIX inhibitor in hemophilia B with poor replacement response."],"pearls":["FIX inhibitors carry a higher risk of anaphylaxis and nephrotic syndrome than FVIII inhibitors."]},"VWF antigen":{"indicated":["VWD diagnosis/classification — quantify VWF protein.","Part of the initial VWD panel (with an activity assay and FVIII)."],"not_indicated":["As a single test to exclude VWD — pair with an activity assay and FVIII."],"pearls":["Lower in blood group O; acute-phase reactant — interpret against ABO ranges and repeat if borderline."]},"VWF activity (GPIbM)":{"indicated":["Measure VWF platelet-binding function (recombinant GPIb assay, not ristocetin-dependent); VWD screening/classification."],"pearls":["Not affected by the p.D1472H polymorphism that spuriously lowers ristocetin cofactor in some patients."]},"VWF activity (Ristocetin cofactor)":{"indicated":["Classic VWF function assay for VWD diagnosis.","Calculate activity:antigen ratio (< 0.7 suggests a qualitative/type 2 defect)."],"pearls":["High imprecision at low levels; the D1472H variant can spuriously lower it."]},"VWF collagen binding (VWF:CB)":{"indicated":["Detect loss of high-molecular-weight multimers (type 2 VWD); complements ristocetin cofactor."],"pearls":["VWF:CB/Ag ratio is sensitive to HMW-multimer loss."]},"VWF multimers":{"indicated":["Subclassify type 2 VWD (2A, 2B, 2M, 2N) once a qualitative defect is suspected (low activity:antigen ratio)."],"not_indicated":["First-line VWD screen — labor-intensive; reserve for classification."]},"Factor VIII activity":{"indicated":["VWD evaluation — FVIII is carried/stabilized by VWF (low in type 3 and type 2N).","Distinguish type 2N VWD from mild hemophilia A."],"pearls":["FVIII disproportionately low relative to VWF → suspect type 2N (or coexisting hemophilia A)."]},"ADAMTS13 activity":{"indicated":["Suspected TTP — microangiopathic hemolytic anemia + thrombocytopenia without another explanation.","Distinguish TTP (severe deficiency) from other thrombotic microangiopathies (HUS, DIC, secondary TMA).","Draw BEFORE plasma exchange / plasma transfusion when feasible (treatment raises the level)."],"not_indicated":["Routine workup of all thrombocytopenia or all TMA without MAHA.","After plasma has been given, to 'rule in' TTP — exogenous ADAMTS13 falsely raises activity."],"pearls":["Activity < 10% supports TTP — pair with the inhibitor / anti-ADAMTS13 antibody assay.","Do not delay empiric plasma exchange while awaiting the result if TTP is clinically suspected (use PLASMIC score)."]},"ADAMTS13 inhibitor":{"indicated":["Confirm acquired (immune) TTP once ADAMTS13 activity is severely deficient (< 10%).","Distinguish acquired from congenital (Upshaw-Schulman) TTP."],"not_indicated":["Before a severely low ADAMTS13 activity is documented."],"pearls":["A demonstrable inhibitor / anti-ADAMTS13 IgG supports immune TTP (rituximab/immunosuppression); absent inhibitor with low activity → consider congenital TTP."]},"Protein C activity":{"indicated":["Workup of unprovoked, young, or recurrent VTE; family studies.","Neonatal purpura fulminans or warfarin-induced skin necrosis."],"not_indicated":["During acute thrombosis or on warfarin — PC is vitamin K–dependent and falsely low; test off warfarin (≥ 2 weeks) and away from the acute event."]},"Protein S activity":{"indicated":["Thrombophilia workup (as for protein C); suspected protein S deficiency."],"not_indicated":["During pregnancy, estrogen use, acute thrombosis, or warfarin — all lower protein S (high false-positive rate)."],"pearls":["If activity is low, free antigen is more specific."]},"Protein S free antigen":{"indicated":["Confirm/clarify a low protein S activity; the free fraction is the active form."]},"Protein S total antigen":{"indicated":["Subtype protein S deficiency (type I: total + free low; type III: free low, total normal)."]},"Antithrombin activity":{"indicated":["Thrombophilia workup.","Heparin resistance — failure to reach therapeutic aPTT/anti-Xa on heparin."],"not_indicated":["During acute thrombosis or on heparin (both lower AT — confirm off heparin)."],"pearls":["AT deficiency is the most thrombogenic inherited deficiency and a cause of heparin resistance."]},"Activated protein C resistance":{"indicated":["Functional screen for factor V Leiden; unprovoked VTE workup."],"not_indicated":["On anticoagulants without a modified assay."],"pearls":["Confirm a positive functional screen with the FV Leiden genotype."]},"Factor V Leiden":{"indicated":["Confirm APC resistance; thrombophilia workup of unprovoked/familial VTE."],"not_indicated":["Routine screening of the asymptomatic general population or before low-risk estrogen use."],"pearls":["Genotype is unaffected by anticoagulation or the acute event (unlike functional assays)."]},"Prothrombin G20210A":{"indicated":["Thrombophilia workup of unprovoked/familial VTE."],"not_indicated":["Routine asymptomatic-population screening."],"pearls":["Genetic test — order at any time; not affected by anticoagulants."]},"Homocysteine":{"indicated":["Suspected hyperhomocysteinemia (B12/folate deficiency, renal disease, homocystinuria); selected atherothrombosis workup."],"not_indicated":["Routine VTE thrombophilia panel — low yield; lowering homocysteine has not reduced thrombosis."]},"Lupus anticoagulant (DRVVT)":{"indicated":["Suspected antiphospholipid syndrome (unprovoked thrombosis, recurrent pregnancy loss); part of APS criteria with screen → mix → confirm."],"not_indicated":["On anticoagulation when avoidable — DOACs, heparin, and warfarin cause false positives; defer during acute thrombosis. Confirm persistence at ≥ 12 weeks."],"pearls":["DOACs are a major cause of false-positive lupus anticoagulant."]},"Lupus anticoagulant (PTT-LA / hexagonal phase)":{"indicated":["Second, mechanistically different LA assay — two methods are recommended; clarify an equivocal DRVVT."],"pearls":["A single negative assay does not exclude a lupus anticoagulant."]},"Anticardiolipin IgG":{"indicated":["APS serology (with LA and anti-β2GPI); medium/high-titer IgG is most clinically significant."],"not_indicated":["Acting on one-off low-titer positives without clinical criteria — confirm persistence ≥ 12 weeks."]},"Anticardiolipin IgM":{"indicated":["APS serology panel (supportive)."],"pearls":["Isolated low-titer IgM is frequently a false positive (infection, age)."]},"Beta-2 glycoprotein I IgG":{"indicated":["APS serology — the most specific antibody; part of the revised Sapporo/Sydney criteria."]},"Beta-2 glycoprotein I IgM":{"indicated":["APS serology panel (supportive)."],"pearls":["Interpret with IgG and LA — triple-positivity carries the highest thrombotic risk."]},"Plasminogen activity":{"indicated":["Suspected plasminogen deficiency (ligneous conjunctivitis, unusual thrombosis); impaired-fibrinolysis workup."],"not_indicated":["Routine VTE/thrombophilia panel."]},"Alpha-2 antiplasmin":{"indicated":["Bleeding with normal routine coagulation AND normal FXIII — suspected α2-antiplasmin deficiency (a hyperfibrinolytic bleeding disorder)."],"pearls":["Like FXIII deficiency, missed on PT/aPTT — order specifically."]},"PAI-1 activity":{"indicated":["Suspected PAI-1 deficiency (mucosal/post-traumatic bleeding with normal routine tests, hyperfibrinolysis)."],"not_indicated":["Routine coagulation workup — high biologic/diurnal variability limits utility."]},"Anti-Xa (heparin)":{"indicated":["Monitor unfractionated heparin when the aPTT is unreliable — lupus anticoagulant, elevated factor VIII, heparin resistance, or a baseline-abnormal aPTT."],"not_indicated":["Patients adequately monitored by aPTT without confounders."],"pearls":["UFH-calibrated; therapeutic UFH target ≈ 0.3–0.7 IU/mL."]},"Anti-Xa (LMWH)":{"indicated":["Monitor LMWH in select populations — renal impairment, pregnancy, obesity, pediatrics, very low body weight; draw ~4 h post-dose (peak)."],"not_indicated":["Routine LMWH monitoring in stable patients."],"pearls":["Use an LMWH-calibrated assay with correct peak timing."]},"Anti-Xa (DOAC-calibrated)":{"indicated":["Quantify apixaban/rivaroxaban in bleeding, urgent surgery, suspected over/under-dosing, renal failure, weight extremes, or before thrombolysis."],"not_indicated":["Routine DOAC monitoring; dabigatran (a direct thrombin inhibitor — use dilute thrombin time/ecarin)."],"pearls":["Must be calibrated to the specific drug; a heparin-calibrated anti-Xa is only qualitative for DOACs."]},"Reptilase time":{"indicated":["Evaluate a prolonged thrombin time — separates heparin (reptilase NORMAL) from dysfibrinogenemia/hypofibrinogenemia or FDPs (reptilase PROLONGED)."],"pearls":["Reptilase is insensitive to heparin → normal RT + long TT = heparin effect."]},"Dilute thrombin time":{"indicated":["Quantify dabigatran effect; assess for clinically relevant levels before surgery or thrombolysis."],"not_indicated":["Monitoring factor Xa inhibitors (use DOAC anti-Xa)."],"pearls":["Standard TT is only qualitative for dabigatran; dTT (or ecarin) gives quantitation."]},"Platelet aggregation studies":{"indicated":["Workup of suspected platelet function disorder (mucocutaneous bleeding, normal count and VWF).","Diagnose Glanzmann thrombasthenia, Bernard-Soulier, secretion/storage-pool defects.","Assess antiplatelet drug effect."],"not_indicated":["Thrombocytopenia (unreliable at low counts).","Within ~10–14 days of antiplatelet drugs / NSAIDs (confounds the result)."],"pearls":["Confirm the patient is off aspirin/NSAIDs/clopidogrel; absent aggregation to all agonists except ristocetin → Glanzmann."]},"PFA-100/200":{"indicated":["Global screen for VWD, platelet function defects, and aspirin effect."],"not_indicated":["Definitive diagnosis — a normal PFA does NOT exclude a platelet function disorder or mild VWD.","Thrombocytopenia or anemia (results are Hct- and platelet-count dependent)."],"pearls":["Screen only — abnormal or normal results need confirmatory LTA / VWD testing."]},"Platelet nucleotide (ATP) release":{"indicated":["Suspected platelet secretion / dense-granule (storage-pool) defect — often paired with LTA by lumiaggregometry."],"pearls":["Detects dense-granule release defects that standard LTA may miss."]}}},"reactions":{"_note":"Transfusion-reaction reference. Reaction case definitions and the Definitive/Probable/Possible diagnostic-certainty criteria are transcribed from the CDC NHSN Biovigilance Component — Hemovigilance Module Surveillance Protocol (v2.6, March 2021) / AABB Quick Reference Guide. Severity and imputability follow NHSN/AABB/ISBT-IHN. These are SURVEILLANCE definitions, not clinical-care definitions. EDUCATIONAL REFERENCE ONLY — institution policy and the blood bank medical director govern actual reporting and management. Verify against the current NHSN protocol version.","_sources":["CDC NHSN Biovigilance Component — Hemovigilance Module Surveillance Protocol v2.6 (March 2021)","AABB Quick Reference Guide — NHSN Hemovigilance Module: Adverse Reaction Definitions","ISBT / International Haemovigilance Network — proposed standard definitions for non-infectious adverse transfusion reactions"],"_axes_note":"NHSN classifies every reported reaction on THREE separate axes: (1) DIAGNOSTIC CERTAINTY — how well the case meets the reaction-specific case definition (Definitive / Probable / Possible); (2) SEVERITY — grade 1–4; (3) IMPUTABILITY — relatedness to the transfusion (definite → ruled out). Do not confuse certainty with imputability.","diagnostic_certainty":[{"level":"Definitive","desc":"The case meets the full reaction-specific NHSN case definition."},{"level":"Probable","desc":"Meets a reduced / partial set of the reaction-specific criteria (defined per reaction below)."},{"level":"Possible","desc":"Reaction is suspected but reported symptoms / tests / information are insufficient to meet the criteria, and no more specific reaction applies."},{"level":"Not determined (Unknown)","desc":"Transfusion-related symptoms occurred but the event could not be classified into a defined reaction."}],"imputability":[{"level":"Definite (certain)","score":"3","desc":"Conclusive evidence beyond reasonable doubt that the reaction is attributable to the transfusion."},{"level":"Probable (likely)","score":"2","desc":"Evidence clearly in favor of attributing the reaction to the transfusion."},{"level":"Possible","score":"1","desc":"Evidence indeterminate — the reaction may be attributable to the transfusion OR to another cause."},{"level":"Doubtful (unlikely)","score":"0","desc":"Evidence clearly in favor of a cause other than the transfusion."},{"level":"Ruled out (excluded)","score":"NA","desc":"Conclusive evidence beyond reasonable doubt that the reaction is NOT related to the transfusion."},{"level":"Not determined","score":"ND","desc":"Insufficient information to assess imputability. (NHSN: a 'Possible' diagnostic-certainty case cannot carry definite or probable imputability.)"}],"severity":[{"grade":"Grade 1 — Non-severe","desc":"No immediate or long-term threat to life; recovery without intervention or with minor/symptomatic treatment."},{"grade":"Grade 2 — Severe","desc":"Inpatient hospitalization or prolongation attributable to the reaction; persistent/significant disability; or medical/surgical intervention to preclude permanent damage."},{"grade":"Grade 3 — Life-threatening","desc":"Major intervention required (vasopressors, intubation, ICU transfer) to prevent death."},{"grade":"Grade 4 — Death","desc":"The recipient died following a transfusion reaction (death possibly, probably, or definitely related)."}],"general_workup":["STOP the transfusion immediately; keep the IV line open with normal saline.","Recheck patient identity against the unit tag/label at the bedside (clerical check).","Notify the blood bank and the ordering/covering provider.","Return the unit + attached set and a fresh post-reaction patient sample to the blood bank.","Blood bank: clerical check, visual hemolysis check (pre/post plasma), repeat ABO/Rh on pre- and post-samples, DAT on post-sample; extend (antibody screen/ID, repeat crossmatch) per findings.","Targeted labs by presentation: CBC, LDH, haptoglobin, indirect bilirubin, plasma free Hgb, urinalysis for hemoglobinuria, renal panel, coags/DIC panel; cultures of patient and unit if sepsis suspected."],"other_unknown":"OTHER — a reaction not defined in the Hemovigilance protocol (e.g., transfusion-associated acute gut injury [TRAGI], transfusion-related immunomodulation [TRIM], iron overload, microchimerism, hyperkalemia, thrombosis). UNKNOWN — transfusion-related symptoms occurred but the causative event could not be classified.","reactions":[{"id":"fnhtr","name":"Febrile Non-Hemolytic Transfusion Reaction (FNHTR)","category":"Febrile","acuity":"Acute","onset":"During or within 4 hours of transfusion","frequency":"Common","definition":"Fever and/or chills without hemolysis during or within 4 h of cessation. Most often from passively transfused cytokines or recipient antibodies to donor leukocytes; blood cultures negative and no laboratory evidence of acute hemolysis.","certainty":{"definitive":"Occurs during or within 4 h of cessation AND either: fever (≥38°C / 100.4°F oral and a ≥1°C / 1.8°F rise from the pre-transfusion value) OR chills/rigors. (May be reported as FNHTR without fever if chills/rigors occur.)","probable":"N/A","possible":"FNHTR suspected but reported symptoms / information are insufficient to meet the definitive criteria, and no more specific reaction applies."},"signs":["Fever ≥38°C and ≥1°C rise","Chills, rigors","Mild discomfort, headache"],"mechanism":"Recipient antibodies to donor leukocytes and/or accumulated cytokines in stored cellular components.","workup":["Diagnosis of exclusion — rule out acute hemolysis (clerical check, DAT, hemolysis check) and bacterial contamination (sepsis) first."],"management":["Stop/slow and evaluate","Antipyretics (acetaminophen); avoid aspirin in thrombocytopenia","Resume only after hemolysis and sepsis excluded, per policy"],"prevention":["Leukoreduction (primary measure)","Pre-storage leukoreduction reduces cytokine accumulation","Premedication of limited proven benefit; not routine"],"imputability_notes":"Common but a diagnosis of exclusion; AHTR and sepsis present with fever and must be ruled out first."},{"id":"allergic","name":"Allergic Reaction","category":"Allergic","acuity":"Acute","onset":"During or within 4 hours","frequency":"Common","definition":"Interaction of an allergen with preformed antibodies (sometimes passively infused atopic-donor antibodies); may present with mucocutaneous signs only. NHSN reports allergic reactions as ONE type graded by severity; minor (non-severe) allergic reactions need not be reported to NHSN.","certainty":{"definitive":"≥2 of the following during or within 4 h of cessation: conjunctival edema · edema of lips/tongue/uvula · periorbital erythema & edema · generalized flushing · hypotension · localized angioedema · maculopapular rash · pruritus (itching) · respiratory distress/bronchospasm · urticaria (hives).","probable":"ANY 1 of the above signs occurring during or within 4 h of cessation.","possible":"N/A"},"signs":["Urticaria / hives, pruritus","Flushing","Localized angioedema","(severe →) respiratory / cardiovascular signs"],"mechanism":"Recipient IgE / mast-cell response to soluble allergens (plasma proteins) in the component.","workup":["Clinical. The only reaction that may be paused and RESTARTED if isolated urticaria resolves with antihistamine, per policy."],"management":["Pause; antihistamine (e.g., diphenhydramine)","May cautiously resume if limited to resolving urticaria","Any respiratory/hemodynamic involvement → treat as anaphylaxis"],"prevention":["Antihistamine premedication for recurrent reactions","Washed components for severe/recurrent cases"],"imputability_notes":"Isolated urticaria = minor allergic; hypotension or airway/respiratory signs make it severe (see anaphylactic)."},{"id":"anaphylactic","name":"Anaphylactic / severe allergic reaction","category":"Allergic","acuity":"Acute","onset":"Rapid — usually seconds to minutes of starting","frequency":"Rare","definition":"Severe allergic reaction with respiratory (stridor, bronchospasm, hypoxemia) and/or cardiovascular (hypotension, shock) compromise. NHSN classifies this as a SEVERE 'Allergic Reaction' (severity grade 2–3), not a separate reaction type. Classic association Concordant culture from recipient and unit confirms; fever + hypotension after platelets needs a sepsis workup alongside AHTR."},{"id":"tti","name":"Transfusion-Transmitted Infection (TTI)","category":"Infectious","acuity":"Variable (acute to delayed)","onset":"Variable","frequency":"Very rare (routinely-screened agents)","definition":"A bacterium, parasite, virus, or other potential pathogen transmitted in donated blood to the transfusion recipient.","certainty":{"definitive":"Laboratory evidence of a pathogen in the transfusion recipient.","probable":"N/A","possible":"Temporally-associated, unexplained clinical illness consistent with infection but no pathogen detected in the recipient, and more specific reactions ruled out. (A 'Possible' case cannot meet definite or probable imputability.)"},"signs":["Depends on agent (e.g., hepatitis, seroconversion, sepsis)","Often detected on later testing"],"mechanism":"Window-period donation, agents not routinely screened, or emerging pathogens.","workup":["Confirm pathogen / seroconversion in recipient; donor look-back & testing","Report to blood center & public health"],"management":["Agent-specific treatment","Donor deferral and recipient tracing"],"prevention":["Donor questionnaire/deferral, serologic + nucleic-acid testing","Pathogen reduction; leukoreduction (CMV-risk reduction)"],"imputability_notes":"vCJD (prion) has no screening assay — risk is managed by leukoreduction and geographic donor deferral, not testing."},{"id":"tad","name":"Transfusion-Associated Dyspnea (TAD)","category":"Respiratory","acuity":"Acute","onset":"Within 24 hours","frequency":"Uncommon","definition":"Respiratory distress within 24 h of cessation that does NOT meet the criteria for TRALI, TACO, or allergic reaction, and is not otherwise explained by the patient's underlying/pre-existing condition — a diagnosis of exclusion.","certainty":{"definitive":"Acute respiratory distress within 24 h of cessation AND the Allergic, TACO, and TRALI defini const RH_SET = new Set(["D", "C", "c", "E", "e"]);

  "7to8": [1, 2, "Hemoglobin 7–7.9 g/dL — at/near the usual transfusion threshold; prepare units."],

  card.append(el("div", { class: "detail-head" }, el("h2", {}, rx.name), rx.acuity ? el("span", { class: "badge pill" }, rx.acuity) : null, rx.frequency ? el("span", { class: "badge grade" }, rx.frequency) : null));
  if (rx.definition) card.append(el("p", {}, rx.definition));
  card.append(defList([["Category", rx.category], ["Onset", rx.onset], ["Mechanism", rx.mechanism]].filter(([, v]) => v)));

  // ① Diagnostic certainty — 3-column case-definition table (NHSN)
  if (rx.certainty) {
    card.append(el("h3", {}, "① Diagnostic certainty — NHSN case definition"));
    const c = rx.certainty, grid = el("div", { class: "cert3" });
    for (const [label, val, cls] of [["Definitive", c.definitive, "cat-IV"], ["Probable", c.probable, "cat-III"], ["Possible", c.possible, "cat-II"]]) {
      const na = !val || val === "N/A";
      grid.append(el("div", { class: "cert3-col" + (na ? " na" : "") },
        el("div", { class: "cert3-head " + cls }, label),
        el("div", { class: "cert3-body" + (na ? " muted" : "") }, na ? "Not applicable for this reaction" : val)));
    }
    card.append(grid);
  }
  // ② Severity grading
  card.append(el("h3", {}, "② Severity grading"));
  card.append(axis2(arr(R.severity).map((g) => [g.grade, g.desc]), sevClass));
  // ③ Imputability — relatedness
  card.append(el("h3", {}, "③ Imputability — relatedness to the transfusion"));
  card.append(axis2(arr(R.imputability).map((l) => [l.level, l.desc]), (k) => IMPUT_CLASS[k]));
  if (rx.imputability_notes) card.append(el("div", { class: "block note", style: "margin-top:8px" }, "Imputability note — " + rx.imputability_notes));

  // clinical detail
  const sec = (title, items) => { if (arr(items).length) { card.append(el("h3", {}, title)); card.append(list(items)); } };
  sec("Signs & symptoms", rx.signs); sec("Workup", rx.workup); sec("Management", rx.management); sec("Prevention", rx.prevention);
  content.append(card);
}

// ================= GLOBAL SEARCH =================
function matches(text, q) { return JSON.stringify(text == null ? "" : text).toLowerCase().includes(q.toLowerCase()); }
function renderSearch(q) {
  head("Search", `Results for “${q}” across all modules`);
  let total = 0;
  const group = (title, nodes) => { if (nodes.length) { total += nodes.length; const grid = el("div", { class: "cardgrid" }); nodes.forEach((n) => grid.append(n)); content.append(el("section", { class: "card" }, el("h2", {}, `${title} (${nodes.length})`)), grid); } };
  group("🔄 ASFA indications", arr((KB.asfa || {}).indications).filter((i) => [i.disease, i.indication, i.procedure, i.category, i.grade].some((f) => matches(f, q))).slice(0, 40).map((i) => asfaCard(i, q)));
  const bpData = KB.bloodprep || {};
  group("🩸 MSBOS procedures", arr(bpData.surgeries).filter((s) => [s.name, s.group, s.division].some((f) => matches(f, q))).slice(0, 40).map((s) => el("button", { type: "button", class: "tile", onclick: () => go("bloodprep") }, el("div", { class: "tile-top" }, approachPill(s)), el("div", { class: "tile-title", html: hl(s.name, q) }), el("div", { class: "tile-sub" }, [s.group, s.division].filter(Boolean).join(" · ")))));
  const coag = Object.entries((KB.coag || {}).tests || {}).filter(([n, t]) => matches(n, q) || matches(t, q)).map(([n, t]) => coagCard(n, t, q));
  if (coag.length) { total += coag.length; content.append(el("section", { class: "card" }, el("h2", {}, `🧪 Coag tests (${coag.length})`))); coag.forEach((c) => content.append(c)); }
  group("⚠️ Transfusion reactions", arr((KB.reactions || {}).reactions).filter((rx) => [rx.name, rx.category, rx.definition, rx.signs, rx.mechanism].some((f) => matches(f, q))).map((rx) => reactionCard(rx, q)));
  if (!total) content.append(el("div", { class: "empty" }, `No matches for “${q}”.`));
}

// ---------- boot ----------
(function boot() {
  if (!window.KB || !Object.keys(KB).length) { content.append(el("div", { class: "empty" }, "Knowledge not loaded. Run build.py to generate kb.js, then reload.")); return; }
  const r = location.hash.replace("#", "");
  if (["asfa", "bloodprep", "coag", "reactions"].includes(r)) state.route = r;
  render();
})();

</script>
